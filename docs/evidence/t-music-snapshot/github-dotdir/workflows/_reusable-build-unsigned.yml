name: _Reusable Build Unsigned APK

on:
  workflow_call:
    inputs:
      apktool_ver:
        description: Apktool version
        required: false
        type: string
        default: ""
      jadx_ver:
        description: JADX version (pre-fetched for downstream workflows)
        required: false
        type: string
        default: ""
      upload_artifact:
        description: Upload unsigned APK as workflow artifact
        required: false
        type: boolean
        default: true
      artifact_name:
        description: Artifact name override
        required: false
        type: string
        default: ""
    outputs:
      apk_path:
        description: Path to unsigned APK in workspace
        value: ${{ jobs.build.outputs.apk_path }}
      apk_size:
        description: Human-readable unsigned APK size
        value: ${{ jobs.build.outputs.apk_size }}
      artifact_name:
        description: Artifact name when upload_artifact is enabled
        value: ${{ jobs.build.outputs.artifact_name }}
      artifact_url:
        description: Artifact download URL when upload_artifact is enabled
        value: ${{ jobs.build.outputs.artifact_url }}

jobs:
  build:
    name: Build unsigned APK
    runs-on: ubuntu-latest
    outputs:
      apk_path: ${{ steps.out.outputs.apk_path }}
      apk_size: ${{ steps.out.outputs.apk_size }}
      artifact_name: ${{ steps.out.outputs.artifact_name }}
      artifact_url: ${{ steps.out.outputs.artifact_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          apktool_ver: ${{ inputs.apktool_ver }}
          jadx_ver: ${{ inputs.jadx_ver }}
          tool_profile: build

      - name: Locate aapt2 from Android SDK
        id: aapt2
        run: |
          set -euo pipefail
          aapt2_bin=$(find "$ANDROID_SDK_ROOT/build-tools" \
            -mindepth 2 -maxdepth 2 \
            -type f -name aapt2 -perm -111 \
            | sort | tail -1)
          [[ -n "$aapt2_bin" && -x "$aapt2_bin" ]] || {
            echo "aapt2 not found under $ANDROID_SDK_ROOT/build-tools" >&2
            exit 1
          }
          echo "path=$aapt2_bin" >> "$GITHUB_OUTPUT"

      - name: Build unsigned APK
        id: build
        env:
          AAPT2_SRC: ${{ steps.aapt2.outputs.path }}
        run: |
          set -euo pipefail
          mkdir -p dist "$RUNNER_TEMP"
          aapt2_tmp="$RUNNER_TEMP/aapt2"
          cp "$AAPT2_SRC" "$aapt2_tmp"
          chmod +x "$aapt2_tmp"

          rm -f dist/com.tw.music-unsigned.apk
          java -Xms256m -Xmx2048m \
            -jar .tools/apktool.jar build \
            --aapt "$aapt2_tmp" \
            app/apktool \
            -o dist/com.tw.music-unsigned.apk

          [[ -f dist/com.tw.music-unsigned.apk ]] || {
            echo "apktool exited 0 but APK not found" >&2
            exit 1
          }
          apk_size=$(du -h dist/com.tw.music-unsigned.apk | cut -f1)
          echo "apk_size=$apk_size" >> "$GITHUB_OUTPUT"

      - name: Choose artifact name
        id: artifact_name
        run: |
          set -euo pipefail
          if [[ -n "${{ inputs.artifact_name }}" ]]; then
            chosen="${{ inputs.artifact_name }}"
          else
            chosen="unsigned-apk-${{ github.run_id }}"
          fi
          echo "name=$chosen" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned APK
        id: upload_unsigned
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact_name.outputs.name }}
          path: dist/com.tw.music-unsigned.apk
          if-no-files-found: error
          retention-days: 30

      - name: Expose outputs
        id: out
        run: |
          set -euo pipefail
          echo "apk_path=dist/com.tw.music-unsigned.apk" >> "$GITHUB_OUTPUT"
          echo "apk_size=${{ steps.build.outputs.apk_size }}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${{ steps.artifact_name.outputs.name }}" >> "$GITHUB_OUTPUT"
          echo "artifact_url=${{ steps.upload_unsigned.outputs.artifact-url }}" >> "$GITHUB_OUTPUT"

      - name: Build job summary
        if: always()
        run: |
          {
            echo "## 🧱 Reusable build summary"
            echo ""
            echo "- **Job status:** \`${{ job.status }}\`"
            echo "- **upload_artifact:** \`${{ inputs.upload_artifact }}\`"
            echo "| Output | Value |"
            echo "|--------|-------|"
            echo "| APK path | \`dist/com.tw.music-unsigned.apk\` |"
            echo "| APK size | ${{ steps.build.outputs.apk_size }} |"
            if [[ -n "${{ steps.upload_unsigned.outputs.artifact-url }}" ]]; then
              echo "| Artifact | [${{ steps.artifact_name.outputs.name }}](${{ steps.upload_unsigned.outputs.artifact-url }}) |"
            else
              echo "| Artifact | Not uploaded |"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
