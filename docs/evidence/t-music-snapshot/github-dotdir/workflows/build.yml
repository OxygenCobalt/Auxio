name: Build

on:
  workflow_dispatch:
    inputs:
      apktool_ver:
        description: Apktool version (blank = resolve latest release)
        default: ""
        type: string
      jadx_ver:
        description: JADX version (blank = resolve latest release) (pre-fetched so later exports are faster)
        default: ""
        type: string
      upload_artifact:
        description: Upload unsigned APK artifact
        default: true
        type: boolean
      artifact_name:
        description: Optional artifact name override (blank = auto)
        default: ""
        type: string

jobs:
  build-unsigned:
    uses: ./.github/workflows/_reusable-build-unsigned.yml
    with:
      apktool_ver: ${{ inputs.apktool_ver }}
      jadx_ver: ${{ inputs.jadx_ver }}
      upload_artifact: ${{ inputs.upload_artifact }}
      artifact_name: ${{ inputs.artifact_name }}

  summary:
    name: Build summary
    runs-on: ubuntu-latest
    if: always()
    needs: build-unsigned
    steps:
      - name: Write job summary
        run: |
          {
            echo "## 🏗️ Build workflow summary"
            echo ""
            echo "- **Job result:** \`${{ needs.build-unsigned.result }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **Input apktool_ver:** \`${{ inputs.apktool_ver }}\`"
            echo "- **Input jadx_ver:** \`${{ inputs.jadx_ver }}\`"
            echo "- **Input upload_artifact:** \`${{ inputs.upload_artifact }}\`"
            echo ""
            if [[ "${{ needs.build-unsigned.result }}" != "success" ]]; then
              echo "**❌ Build failed before unsigned APK output was finalized.**"
              echo ""
              echo "### Next steps"
              echo "- Open failed steps in the **build-unsigned** job."
              echo "- Verify Apktool/JADX versions and aapt2 discovery on the runner."
              exit 0
            fi
            echo "### Output"
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Output APK | \`${{ needs.build-unsigned.outputs.apk_path }}\` |"
            echo "| APK size | ${{ needs.build-unsigned.outputs.apk_size }} |"
            echo "| Artifact name | \`${{ needs.build-unsigned.outputs.artifact_name }}\` |"
            echo "| Retention | 30 days |"
            if [[ -n "${{ needs.build-unsigned.outputs.artifact_url }}" ]]; then
              echo "| Artifact | [${{ needs.build-unsigned.outputs.artifact_name }}](${{ needs.build-unsigned.outputs.artifact_url }}) |"
            fi
            echo ""
            echo "### Next steps"
            echo "- Use **JADX Export** workflow to refresh reference trees from this APK."
          } >> "$GITHUB_STEP_SUMMARY"
