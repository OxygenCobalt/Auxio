name: JADX Export

# Runs JADX directly against an APK to produce Java reference output under
# reference/jadx-raw/ and/or reference/jadx-aliased/.
#
# These outputs are READ-ONLY reference material — the canonical editable
# surface is app/apktool/.
#
# Typical usage:
#   - After building a new unsigned APK: mode=raw (or both) to refresh the
#     raw reference.
#   - After adding renames to mappings/manual-enigma/: mode=aliased to
#     update the aliased reference so new names appear in JADX output.

on:
  workflow_dispatch:
    inputs:
      source_apk:
        description: APK to decompile (relative to workspace root)
        default: "dist/com.tw.music-unsigned.apk"
        type: string
      mode:
        description: Which exports to produce
        type: choice
        options:
          - both
          - raw
          - aliased
        default: both
      build_first:
        description: >
          Build the unsigned APK from app/apktool/ first.
          Use this when you want a fresh build + export in one run.
        default: false
        type: boolean
      apktool_ver:
        description: Apktool version (blank = resolve latest release)
        default: ""
        type: string
      jadx_ver:
        description: JADX version (blank = resolve latest release)
        default: ""
        type: string
      clean_output_dirs:
        description: Remove existing output files before export
        default: true
        type: boolean
      upload_artifacts:
        description: Upload export outputs/logs as workflow artifacts
        default: true
        type: boolean
      raw_retention_days:
        description: Retention days for raw/aliased artifacts
        default: "30"
        type: string
      log_retention_days:
        description: Retention days for log artifacts
        default: "14"
        type: string

jobs:
  jadx-export:
    name: JADX export (${{ inputs.mode }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          apktool_ver: ${{ inputs.apktool_ver }}
          jadx_ver: ${{ inputs.jadx_ver }}
          tool_profile: full

      # -----------------------------------------------------------------------
      # Optional: build APK first so the export is against a fresh rebuild
      # -----------------------------------------------------------------------
      - name: Locate aapt2 (build-first only)
        id: aapt2
        if: inputs.build_first
        run: |
          set -euo pipefail
          aapt2_bin=$(find "$ANDROID_SDK_ROOT/build-tools" \
            -mindepth 2 -maxdepth 2 -type f -name aapt2 -perm -111 \
            | sort | tail -1)
          [[ -n "$aapt2_bin" && -x "$aapt2_bin" ]] || {
            echo "aapt2 not found under $ANDROID_SDK_ROOT/build-tools" >&2; exit 1
          }
          echo "path=$aapt2_bin" >> "$GITHUB_OUTPUT"

      - name: Build unsigned APK (optional)
        if: inputs.build_first
        env:
          AAPT2_SRC: ${{ steps.aapt2.outputs.path }}
        run: |
          set -euo pipefail
          mkdir -p dist "$RUNNER_TEMP"
          aapt2_tmp="$RUNNER_TEMP/aapt2"
          cp "$AAPT2_SRC" "$aapt2_tmp"
          chmod +x "$aapt2_tmp"
          rm -f dist/com.tw.music-unsigned.apk
          java -Xms256m -Xmx2048m \
            -jar .tools/apktool.jar build \
            --aapt "$aapt2_tmp" \
            app/apktool \
            -o dist/com.tw.music-unsigned.apk
          [[ -f dist/com.tw.music-unsigned.apk ]] || { echo "APK not produced" >&2; exit 1; }

      # -----------------------------------------------------------------------
      # Validate input APK
      # -----------------------------------------------------------------------
      - name: Verify source APK exists
        run: |
          set -euo pipefail
          apk="${{ inputs.source_apk }}"
          [[ -f "$apk" ]] || { echo "APK not found: $apk" >&2; exit 1; }
          echo "Source APK: $apk  ($(du -h "$apk" | cut -f1))"

      # -----------------------------------------------------------------------
      # JADX raw export
      # Flags: --deobf --show-bad-code
      #   + --deobf-cfg-file <jobf> (if supported) to persist/reuse the
      #     auto-deobfuscation cache between runs.
      # -----------------------------------------------------------------------
      - name: JADX raw export
        id: jadx_raw
        if: inputs.mode == 'raw' || inputs.mode == 'both'
        env:
          SOURCE_APK: ${{ inputs.source_apk }}
        run: |
          set -euo pipefail
          jadx=".tools/jadx/bin/jadx"
          apk="$SOURCE_APK"
          jobf="mappings/jadx/$(basename "${apk%.apk}").jobf"
          log="docs/reports/jadx-raw.log"
          mkdir -p reference/jadx-raw mappings/jadx docs/reports

          # Probe supported flags once
          jadx_help=$("$jadx" --help 2>&1 || true)
          cmd=("$jadx" --deobf --show-bad-code -d reference/jadx-raw)
          if printf '%s' "$jadx_help" | grep -q -- '--deobf-cfg-file'; then
            cmd+=(--deobf-cfg-file "$jobf")
            printf '%s' "$jadx_help" | grep -q -- '--deobf-cfg-file-mode' \
              && cmd+=(--deobf-cfg-file-mode read-or-save)
          fi
          cmd+=("$apk")

          if [[ "${{ inputs.clean_output_dirs }}" == "true" ]]; then rm -rf reference/jadx-raw/*; fi
          rc=0
          "${cmd[@]}" >"$log" 2>&1 || rc=$?

          count=$(find reference/jadx-raw -type f \
            \( -name '*.java' -o -name '*.json' -o -name '*.xml' \) \
            2>/dev/null | wc -l | tr -d ' ')

          if [[ $rc -ne 0 && ${count:-0} -eq 0 ]]; then
            echo "[ERR] JADX raw export failed and produced no output files." >&2
            sed -n '1,60p' "$log" >&2 || true
            exit "$rc"
          fi
          echo "[OK] JADX raw export: $count files (jadx exit=$rc)"
          echo "raw_count=$count" >> "$GITHUB_OUTPUT"
          echo "raw_rc=$rc" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # JADX aliased export
      # Adds --mappings-path mappings/manual-enigma --mappings-mode read so
      # that human-reviewed renames from Enigma mapping files are applied.
      # -----------------------------------------------------------------------
      - name: JADX aliased export
        id: jadx_aliased
        if: inputs.mode == 'aliased' || inputs.mode == 'both'
        env:
          SOURCE_APK: ${{ inputs.source_apk }}
        run: |
          set -euo pipefail
          jadx=".tools/jadx/bin/jadx"
          apk="$SOURCE_APK"
          jobf="mappings/jadx/$(basename "${apk%.apk}").jobf"
          log="docs/reports/jadx-aliased.log"
          mkdir -p reference/jadx-aliased mappings/jadx mappings/manual-enigma docs/reports

          jadx_help=$("$jadx" --help 2>&1 || true)
          cmd=("$jadx" --deobf --show-bad-code -d reference/jadx-aliased)

          # Apply manual Enigma renames if supported
          if printf '%s' "$jadx_help" | grep -q -- '--mappings-path'; then
            cmd+=(--mappings-path mappings/manual-enigma)
            printf '%s' "$jadx_help" | grep -q -- '--mappings-mode' \
              && cmd+=(--mappings-mode read)
          fi
          # Persist/reuse auto-deobf cache
          if printf '%s' "$jadx_help" | grep -q -- '--deobf-cfg-file'; then
            cmd+=(--deobf-cfg-file "$jobf")
            printf '%s' "$jadx_help" | grep -q -- '--deobf-cfg-file-mode' \
              && cmd+=(--deobf-cfg-file-mode read-or-save)
          fi

          # Count Enigma rename entries being applied
          enigma_renames=$(grep -c '^[[:space:]]*\(CLASS\|METHOD\|FIELD\)' \
            mappings/manual-enigma/*.mapping 2>/dev/null | awk -F: '{s+=$2} END{print s+0}') || true

          cmd+=("$apk")

          if [[ "${{ inputs.clean_output_dirs }}" == "true" ]]; then rm -rf reference/jadx-aliased/*; fi
          rc=0
          "${cmd[@]}" >"$log" 2>&1 || rc=$?

          count=$(find reference/jadx-aliased -type f \
            \( -name '*.java' -o -name '*.json' -o -name '*.xml' \) \
            2>/dev/null | wc -l | tr -d ' ')

          if [[ $rc -ne 0 && ${count:-0} -eq 0 ]]; then
            echo "[ERR] JADX aliased export failed and produced no output files." >&2
            sed -n '1,60p' "$log" >&2 || true
            exit "$rc"
          fi
          echo "[OK] JADX aliased export: $count files (jadx exit=$rc)"
          echo "aliased_count=$count" >> "$GITHUB_OUTPUT"
          echo "aliased_rc=$rc" >> "$GITHUB_OUTPUT"
          echo "enigma_renames=${enigma_renames:-0}" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Artifacts
      # -----------------------------------------------------------------------
      - name: Upload JADX raw output
        id: upload_raw
        if: inputs.upload_artifacts && always() && (inputs.mode == 'raw' || inputs.mode == 'both')
        uses: actions/upload-artifact@v4
        with:
          name: jadx-raw-${{ github.run_id }}
          path: reference/jadx-raw/
          if-no-files-found: ignore
          retention-days: ${{ fromJSON(inputs.raw_retention_days) }}

      - name: Upload JADX aliased output
        id: upload_aliased
        if: inputs.upload_artifacts && always() && (inputs.mode == 'aliased' || inputs.mode == 'both')
        uses: actions/upload-artifact@v4
        with:
          name: jadx-aliased-${{ github.run_id }}
          path: reference/jadx-aliased/
          if-no-files-found: ignore
          retention-days: ${{ fromJSON(inputs.raw_retention_days) }}

      - name: Upload JADX logs
        id: upload_logs
        if: inputs.upload_artifacts && always()
        uses: actions/upload-artifact@v4
        with:
          name: jadx-logs-${{ github.run_id }}
          path: docs/reports/jadx-*.log
          if-no-files-found: ignore
          retention-days: ${{ fromJSON(inputs.log_retention_days) }}

      - name: Write job summary
        if: always()
        env:
          MODE: ${{ inputs.mode }}
          SOURCE_APK: ${{ inputs.source_apk }}
          RAW_COUNT: ${{ steps.jadx_raw.outputs.raw_count }}
          RAW_RC: ${{ steps.jadx_raw.outputs.raw_rc }}
          ALIASED_COUNT: ${{ steps.jadx_aliased.outputs.aliased_count }}
          ALIASED_RC: ${{ steps.jadx_aliased.outputs.aliased_rc }}
          ENIGMA_RENAMES: ${{ steps.jadx_aliased.outputs.enigma_renames }}
          RAW_URL: ${{ steps.upload_raw.outputs.artifact-url }}
          ALIASED_URL: ${{ steps.upload_aliased.outputs.artifact-url }}
          LOGS_URL: ${{ steps.upload_logs.outputs.artifact-url }}
        run: |
          {
            echo "## 🔍 JADX Export — mode: \`$MODE\`"
            echo ""
            echo "- **Job status:** \`${{ job.status }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **build_first:** \`${{ inputs.build_first }}\`"
            echo "- **clean_output_dirs:** \`${{ inputs.clean_output_dirs }}\`"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Source APK | \`$SOURCE_APK\` |"
            echo "| Mode | \`$MODE\` |"
            if [[ "$MODE" == "raw" || "$MODE" == "both" ]]; then
              echo "| Raw files exported | ${RAW_COUNT:-N/A} |"
              echo "| Raw JADX exit code | ${RAW_RC:-N/A} |"
              if [[ -n "${RAW_URL:-}" ]]; then
                echo "| Raw artifact | [jadx-raw-${{ github.run_id }}]($RAW_URL) — expires in ${{ inputs.raw_retention_days }} days |"
              fi
            fi
            if [[ "$MODE" == "aliased" || "$MODE" == "both" ]]; then
              echo "| Aliased files exported | ${ALIASED_COUNT:-N/A} |"
              echo "| Enigma renames applied | ${ENIGMA_RENAMES:-0} |"
              echo "| Aliased JADX exit code | ${ALIASED_RC:-N/A} |"
              if [[ -n "${ALIASED_URL:-}" ]]; then
                echo "| Aliased artifact | [jadx-aliased-${{ github.run_id }}]($ALIASED_URL) — expires in ${{ inputs.raw_retention_days }} days |"
              fi
            fi
            if [[ -n "${LOGS_URL:-}" ]]; then
              echo "| Logs artifact | [jadx-logs-${{ github.run_id }}]($LOGS_URL) — expires in ${{ inputs.log_retention_days }} days |"
            else
              echo "| Logs artifact | Not uploaded (upload_artifacts=${{ inputs.upload_artifacts }}) |"
            fi
            echo ""
            echo "### Next steps"
            echo "- If JADX exit code is non-zero with output present, inspect logs artifact for partial decompile warnings."
            echo "- Re-run with \`mode=aliased\` after updating \`mappings/manual-enigma/\`."
            echo "> ⚠️ Reference outputs (\`reference/jadx-raw/\` and \`reference/jadx-aliased/\`) are" \
              "**read-only**. The editable source is \`app/apktool/\`."
          } >> "$GITHUB_STEP_SUMMARY"
