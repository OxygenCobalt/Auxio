name: MT Import

# Imports an MT Manager-normalised APK into reference/jadx-mt/ as a
# readability aid for the de-obfuscation workflow.  Also decodes the APK
# into .input/apktool-mt/ for direct smali comparison against app/apktool/.
#
# The MT-normalised APK (dist/com.tw.music-MT.apk) is committed to the repo
# and is the default input.  Both output directories are READ-ONLY reference
# material — do not hand-edit them.
#
# Run this when the MT-normalised APK has been updated or when you want to
# refresh the MT reference decompilation.

on:
  workflow_dispatch:
    inputs:
      mt_apk:
        description: Path to the MT-normalised APK (relative to workspace root)
        default: "dist/com.tw.music-MT.apk"
        type: string
      apktool_ver:
        description: Apktool version (blank = resolve latest release)
        default: ""
        type: string
      jadx_ver:
        description: JADX version (blank = resolve latest release)
        default: ""
        type: string
      clean_output_dirs:
        description: Remove existing MT output directory before export
        default: true
        type: boolean
      upload_artifacts:
        description: Upload MT outputs/log to workflow artifacts
        default: true
        type: boolean
      output_retention_days:
        description: Retention days for MT output artifact
        default: "30"
        type: string
      log_retention_days:
        description: Retention days for MT log artifact
        default: "14"
        type: string

jobs:
  mt-import:
    name: MT-normalised import
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          apktool_ver: ${{ inputs.apktool_ver }}
          jadx_ver: ${{ inputs.jadx_ver }}
          tool_profile: full

      - name: Verify MT APK exists
        run: |
          set -euo pipefail
          apk="${{ inputs.mt_apk }}"
          [[ -f "$apk" ]] || { echo "MT APK not found: $apk" >&2; exit 1; }
          echo "MT APK: $apk  ($(du -h "$apk" | cut -f1))"

      # -----------------------------------------------------------------------
      # Decode MT APK with Apktool (smali reference for comparison)
      # Non-fatal: some MT APKs produce warnings but still decode usefully.
      # -----------------------------------------------------------------------
      - name: Apktool decode MT APK
        id: decode
        env:
          MT_APK: ${{ inputs.mt_apk }}
        run: |
          set -euo pipefail
          mkdir -p .input/apktool-mt "$RUNNER_TEMP"
          rc=0
          java -jar .tools/apktool.jar d -f \
            -o .input/apktool-mt \
            "$MT_APK" \
            >/dev/null 2>&1 || rc=$?
          if [[ $rc -ne 0 ]]; then
            echo "[WARN] Apktool returned $rc for MT APK — continuing (partial decode may still be useful)" >&2
          fi
          smali_count=$(find .input/apktool-mt -name '*.smali' 2>/dev/null | wc -l | tr -d ' ')
          echo "[OK] Apktool MT decode: $smali_count smali files (exit=$rc)"
          echo "smali_count=$smali_count" >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # JADX export of MT APK
      # Same deobfuscation flags as raw export, but using an MT-specific JOBF
      # cache so it doesn't collide with the main app's alias cache.
      # -----------------------------------------------------------------------
      - name: JADX export MT APK
        id: jadx_mt
        env:
          MT_APK: ${{ inputs.mt_apk }}
        run: |
          set -euo pipefail
          jadx=".tools/jadx/bin/jadx"
          apk="$MT_APK"
          jobf="mappings/mt/$(basename "${apk%.apk}").jobf"
          log="docs/reports/jadx-mt.log"
          mkdir -p reference/jadx-mt mappings/mt docs/reports

          jadx_help=$("$jadx" --help 2>&1 || true)
          cmd=("$jadx" --deobf --show-bad-code -d reference/jadx-mt)
          if printf '%s' "$jadx_help" | grep -q -- '--deobf-cfg-file'; then
            cmd+=(--deobf-cfg-file "$jobf")
            printf '%s' "$jadx_help" | grep -q -- '--deobf-cfg-file-mode' \
              && cmd+=(--deobf-cfg-file-mode read-or-save)
          fi
          cmd+=("$apk")

          if [[ "${{ inputs.clean_output_dirs }}" == "true" ]]; then rm -rf reference/jadx-mt/*; fi
          rc=0
          "${cmd[@]}" >"$log" 2>&1 || rc=$?

          count=$(find reference/jadx-mt -type f \
            \( -name '*.java' -o -name '*.json' -o -name '*.xml' \) \
            2>/dev/null | wc -l | tr -d ' ')

          if [[ $rc -ne 0 && ${count:-0} -eq 0 ]]; then
            echo "[ERR] JADX MT export failed and produced no output files." >&2
            sed -n '1,60p' "$log" >&2 || true
            exit "$rc"
          fi
          echo "[OK] JADX MT export: $count files (jadx exit=$rc)"
          echo "java_count=$count" >> "$GITHUB_OUTPUT"
          echo "jadx_rc=$rc" >> "$GITHUB_OUTPUT"

      - name: Upload MT reference output
        id: upload_mt
        if: inputs.upload_artifacts && always()
        uses: actions/upload-artifact@v4
        with:
          name: jadx-mt-${{ github.run_id }}
          path: reference/jadx-mt/
          if-no-files-found: ignore
          retention-days: ${{ fromJSON(inputs.output_retention_days) }}

      - name: Upload MT import log
        id: upload_mt_log
        if: inputs.upload_artifacts && always()
        uses: actions/upload-artifact@v4
        with:
          name: jadx-mt-log-${{ github.run_id }}
          path: docs/reports/jadx-mt.log
          if-no-files-found: ignore
          retention-days: ${{ fromJSON(inputs.log_retention_days) }}

      - name: Write job summary
        if: always()
        env:
          MT_APK: ${{ inputs.mt_apk }}
          SMALI_COUNT: ${{ steps.decode.outputs.smali_count }}
          JAVA_COUNT: ${{ steps.jadx_mt.outputs.java_count }}
          JADX_RC: ${{ steps.jadx_mt.outputs.jadx_rc }}
          ARTIFACT_URL: ${{ steps.upload_mt.outputs.artifact-url }}
          LOG_URL: ${{ steps.upload_mt_log.outputs.artifact-url }}
        run: |
          {
            echo "## 📦 MT Import — \`$MT_APK\`"
            echo ""
            echo "- **Job status:** \`${{ job.status }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **clean_output_dirs:** \`${{ inputs.clean_output_dirs }}\`"
            echo ""
            echo "| Step | Result |"
            echo "|------|--------|"
            echo "| Apktool decode | ${SMALI_COUNT:-N/A} smali files in \`.input/apktool-mt/\` |"
            echo "| JADX export | ${JAVA_COUNT:-N/A} Java/XML files in \`reference/jadx-mt/\` (jadx exit=${JADX_RC:-?}) |"
            if [[ -n "${ARTIFACT_URL:-}" ]]; then
              echo "| Reference artifact | [jadx-mt-${{ github.run_id }}]($ARTIFACT_URL) — expires in ${{ inputs.output_retention_days }} days |"
            fi
            if [[ -n "${LOG_URL:-}" ]]; then
              echo "| Log artifact | [jadx-mt-log-${{ github.run_id }}]($LOG_URL) — expires in ${{ inputs.log_retention_days }} days |"
            fi
            echo ""
            echo "### Next steps"
            echo "- Review \`jadx-mt.log\` when JADX exit code is non-zero."
            echo "- Run **Parity Diff** to compare MT-normalised and candidate outputs."
            echo "> \`reference/jadx-mt/\` is a read-only normalised reference. Do not edit it directly."
            echo "> Compare it against \`reference/jadx-raw/\` using **Parity Diff** to find structural differences."
          } >> "$GITHUB_STEP_SUMMARY"
