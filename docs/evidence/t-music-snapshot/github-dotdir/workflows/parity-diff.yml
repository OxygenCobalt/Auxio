name: Parity Diff

# Manual APK parity diff: decodes two APKs with Apktool and diffs their
# AndroidManifest.xml and res/ file inventories.
#
# Useful for verifying that a rebuilt APK (from app/apktool/) does not
# unintentionally diverge from the baseline (dist/com.tw.music.apk).
#
# Set fail_on_diff=true to gate a manual review on zero differences.
# Diff reports are uploaded as artifacts when differences are found and
# upload_artifacts=true (the default); empty diffs are not uploaded.

on:
  workflow_dispatch:
    inputs:
      build_candidate:
        description: >
          Build a fresh candidate APK from app/apktool/ before diffing.
          Turn off if dist/com.tw.music-unsigned.apk is already current.
        default: true
        type: boolean
      baseline_apk:
        description: Baseline APK path (relative to workspace root)
        default: "dist/com.tw.music.apk"
        type: string
      candidate_apk:
        description: Candidate APK path (relative to workspace root)
        default: "dist/com.tw.music-unsigned.apk"
        type: string
      fail_on_diff:
        description: Fail the workflow when manifest/resource diffs are detected
        default: false
        type: boolean
      apktool_ver:
        description: Apktool version (blank = resolve latest release)
        default: ""
        type: string
      jadx_ver:
        description: JADX version (blank = resolve latest release)
        default: ""
        type: string
      upload_artifacts:
        description: Upload parity diff reports as artifacts
        default: true
        type: boolean
      artifact_retention_days:
        description: Retention days for parity diff artifacts
        default: "30"
        type: string
      clean_existing_reports:
        description: Remove existing parity report files before running
        default: true
        type: boolean

jobs:
  parity-diff:
    name: Parity diff
    runs-on: ubuntu-latest
    env:
      BASE_APK: ${{ inputs.baseline_apk }}
      CANDIDATE_APK: ${{ inputs.candidate_apk }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup tools
        uses: ./.github/actions/setup-tools
        with:
          apktool_ver: ${{ inputs.apktool_ver }}
          jadx_ver: ${{ inputs.jadx_ver }}
          tool_profile: full

      # -----------------------------------------------------------------------
      # Optional: build fresh candidate APK from the editable source tree
      # -----------------------------------------------------------------------
      - name: Locate aapt2 (build only)
        id: aapt2
        if: inputs.build_candidate
        run: |
          set -euo pipefail
          aapt2_bin=$(find "$ANDROID_SDK_ROOT/build-tools" \
            -mindepth 2 -maxdepth 2 -type f -name aapt2 -perm -111 \
            | sort | tail -1)
          [[ -n "$aapt2_bin" && -x "$aapt2_bin" ]] || {
            echo "aapt2 not found under $ANDROID_SDK_ROOT/build-tools" >&2; exit 1
          }
          echo "path=$aapt2_bin" >> "$GITHUB_OUTPUT"

      - name: Build candidate APK (optional)
        if: inputs.build_candidate
        env:
          AAPT2_SRC: ${{ steps.aapt2.outputs.path }}
        run: |
          set -euo pipefail
          mkdir -p dist "$RUNNER_TEMP"
          aapt2_tmp="$RUNNER_TEMP/aapt2"
          cp "$AAPT2_SRC" "$aapt2_tmp"
          chmod +x "$aapt2_tmp"
          rm -f dist/com.tw.music-unsigned.apk
          java -Xms256m -Xmx2048m \
            -jar .tools/apktool.jar build \
            --aapt "$aapt2_tmp" \
            app/apktool \
            -o dist/com.tw.music-unsigned.apk
          [[ -f dist/com.tw.music-unsigned.apk ]] || { echo "APK not produced" >&2; exit 1; }

      # -----------------------------------------------------------------------
      # Validate APK inputs
      # -----------------------------------------------------------------------
      - name: Validate APK paths
        run: |
          set -euo pipefail
          [[ -f "$BASE_APK" ]] || { echo "Baseline APK not found: $BASE_APK" >&2; exit 1; }
          [[ -f "$CANDIDATE_APK" ]] || { echo "Candidate APK not found: $CANDIDATE_APK" >&2; exit 1; }
          echo "Baseline:  $BASE_APK  ($(du -h "$BASE_APK" | cut -f1))"
          echo "Candidate: $CANDIDATE_APK  ($(du -h "$CANDIDATE_APK" | cut -f1))"

      # -----------------------------------------------------------------------
      # Decode both APKs with Apktool, then diff manifest and res/
      # -----------------------------------------------------------------------
      - name: Decode APKs with Apktool
        run: |
          set -euo pipefail
          work="$RUNNER_TEMP/parity-work"
          mkdir -p "$work/base" "$work/cand"

          echo "Decoding baseline..."
          java -jar .tools/apktool.jar d -f -o "$work/base" "$BASE_APK" >/dev/null
          echo "Decoding candidate..."
          java -jar .tools/apktool.jar d -f -o "$work/cand" "$CANDIDATE_APK" >/dev/null

          # Sanity check
          [[ -f "$work/base/AndroidManifest.xml" ]] || {
            echo "Decoded baseline is missing AndroidManifest.xml" >&2; exit 1
          }
          [[ -f "$work/cand/AndroidManifest.xml" ]] || {
            echo "Decoded candidate is missing AndroidManifest.xml" >&2; exit 1
          }

          # Store work dir for the next step
          echo "PARITY_WORK=$work" >> "$GITHUB_ENV"

      - name: Diff manifest and resource inventory
        run: |
          set -euo pipefail
          work="$PARITY_WORK"
          mkdir -p docs/reports
          if [[ "${{ inputs.clean_existing_reports }}" == "true" ]]; then
            rm -f docs/reports/parity-manifest.diff docs/reports/parity-resources.diff
          fi

          # Diff AndroidManifest.xml
          set +e
          diff -u "$work/base/AndroidManifest.xml" \
                  "$work/cand/AndroidManifest.xml" \
               > docs/reports/parity-manifest.diff
          manifest_rc=$?

          # Diff res/ file inventory (names only, not content)
          (cd "$work/base" && find res -type f 2>/dev/null | sort) \
            > "$work/base-res.txt" || true
          (cd "$work/cand" && find res -type f 2>/dev/null | sort) \
            > "$work/cand-res.txt" || true
          diff -u "$work/base-res.txt" "$work/cand-res.txt" \
               > docs/reports/parity-resources.diff
          res_rc=$?
          set -e

          # diff exit codes: 0=identical, 1=differences, 2=error
          [[ $manifest_rc -ne 2 ]] || {
            echo "diff error comparing manifests" >&2; rm -f docs/reports/parity-manifest.diff; exit 1
          }
          [[ $res_rc -ne 2 ]] || {
            echo "diff error comparing resource inventories" >&2; rm -f docs/reports/parity-resources.diff; exit 1
          }

          manifest_lines=0
          res_lines=0
          [[ $manifest_rc -eq 0 ]] && rm -f docs/reports/parity-manifest.diff \
            || manifest_lines=$(wc -l < docs/reports/parity-manifest.diff | tr -d ' ')
          [[ $res_rc -eq 0 ]] && rm -f docs/reports/parity-resources.diff \
            || res_lines=$(wc -l < docs/reports/parity-resources.diff | tr -d ' ')

          # Pass the diff counts to the summary step via env file
          echo "manifest_rc=$manifest_rc"  >> "$GITHUB_ENV"
          echo "res_rc=$res_rc"            >> "$GITHUB_ENV"
          echo "manifest_lines=$manifest_lines" >> "$GITHUB_ENV"
          echo "res_lines=$res_lines"       >> "$GITHUB_ENV"

          if [[ $manifest_rc -eq 0 && $res_rc -eq 0 ]]; then
            echo "No manifest/resource inventory differences detected."
            exit 0
          fi

          echo ""
          echo "Differences detected:"
          [[ $manifest_rc -ne 0 ]] && echo "  - AndroidManifest.xml differs (see parity-manifest.diff)"
          [[ $res_rc -ne 0 ]]      && echo "  - res/ inventory differs (see parity-resources.diff)"

          if [[ "${{ inputs.fail_on_diff }}" == "true" ]]; then
            echo "fail_on_diff=true — marking run as failed." >&2
            exit 2
          fi

      - name: Upload parity diff reports
        id: upload_diff
        if: inputs.upload_artifacts && always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-diff-${{ github.run_id }}
          path: docs/reports/parity-*.diff
          if-no-files-found: ignore
          retention-days: ${{ fromJSON(inputs.artifact_retention_days) }}

      - name: Write job summary
        if: always()
        env:
          BASE_APK: ${{ inputs.baseline_apk }}
          CANDIDATE_APK: ${{ inputs.candidate_apk }}
          FAIL_ON_DIFF: ${{ inputs.fail_on_diff }}
          ARTIFACT_URL: ${{ steps.upload_diff.outputs.artifact-url }}
        run: |
          {
            if [[ "${manifest_rc:-0}" -ne 0 || "${res_rc:-0}" -ne 0 ]]; then
              echo "## ⚠️ Parity Diff — Differences Found"
            else
              echo "## ✅ Parity Diff — No Differences"
            fi
            echo ""
            echo "- **Job status:** \`${{ job.status }}\`"
            echo "- **Trigger:** \`${{ github.event_name }}\`"
            echo "- **build_candidate:** \`${{ inputs.build_candidate }}\`"
            echo "- **upload_artifacts:** \`${{ inputs.upload_artifacts }}\`"
            echo ""
            echo "| Property | Value |"
            echo "|----------|-------|"
            echo "| Base APK | \`$BASE_APK\` |"
            echo "| Candidate APK | \`$CANDIDATE_APK\` |"
            echo "| Fail on diff | \`$FAIL_ON_DIFF\` |"
            if [[ "${manifest_rc:-0}" -eq 0 ]]; then
              echo "| AndroidManifest.xml | ✅ identical |"
            else
              echo "| AndroidManifest.xml | ❌ differs (${manifest_lines:-?} diff lines) |"
            fi
            if [[ "${res_rc:-0}" -eq 0 ]]; then
              echo "| res/ inventory | ✅ identical |"
            else
              echo "| res/ inventory | ❌ differs (${res_lines:-?} diff lines) |"
            fi
            if [[ -n "${ARTIFACT_URL:-}" && ("${manifest_rc:-0}" -ne 0 || "${res_rc:-0}" -ne 0) ]]; then
              echo "| Diff reports artifact | [parity-diff-${{ github.run_id }}]($ARTIFACT_URL) — expires in ${{ inputs.artifact_retention_days }} days |"
            fi
            echo ""
            echo "### Next steps"
            if [[ "${manifest_rc:-0}" -ne 0 || "${res_rc:-0}" -ne 0 ]]; then
              echo "- Download the diff artifact and review manifest/resource drift."
              echo "- Re-run with \`fail_on_diff=true\` when you want gating behavior."
            else
              echo "- No parity drift detected for manifest/resource inventory."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
