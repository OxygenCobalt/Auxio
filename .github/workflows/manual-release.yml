name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag, e.g. v1.2.3. Leave blank to auto-increment."
        required: false
        type: string
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: manual-release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Prepare CI environment
        shell: bash
        run: bash ./scripts/prepare-ci-environment.sh

      - name: Verify branch release context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
            echo "::error::Manual releases must run from a branch so the workflow can commit version metadata before tagging."
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "dev" ]]; then
            echo "::error::Manual releases must run from the protected/default dev branch, not '${GITHUB_REF_NAME}'."
            exit 1
          fi
          git fetch origin "${GITHUB_REF_NAME}" --tags
          LOCAL_HEAD="$(git rev-parse HEAD)"
          REMOTE_HEAD="$(git rev-parse "origin/${GITHUB_REF_NAME}")"
          if [[ "${LOCAL_HEAD}" != "${REMOTE_HEAD}" ]]; then
            echo "::error::Release checkout is stale."
            echo "::error::Local HEAD:  ${LOCAL_HEAD}"
            echo "::error::Remote head: ${REMOTE_HEAD}"
            echo "::error::Re-run the workflow from the latest ${GITHUB_REF_NAME}."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "ndk;28.2.13676358"

      - name: Verify Android SDK tooling
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          which sdkmanager || true
          sdkmanager --list_installed || true
          which apksigner || true
          if ! command -v apksigner >/dev/null 2>&1; then
            BUILD_TOOLS_APKSIGNER="$(find "${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner 2>/dev/null | sort -V | tail -n1 || true)"
            if [[ -n "${BUILD_TOOLS_APKSIGNER}" ]]; then
              echo "apksigner located at ${BUILD_TOOLS_APKSIGNER}"
            else
              echo "::error::apksigner is unavailable after Android SDK setup."
              exit 1
            fi
          fi

      - name: Ensure native build tools are present
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Compute release version and check collisions
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          set -euo pipefail

          git fetch origin "${GITHUB_REF_NAME}" --tags
          INPUT_TAG="$(printf '%s' "${INPUT_VERSION_TAG}" | xargs)"
          CURRENT_VERSION_NAME="$(sed -n -E 's/^[[:space:]]*versionName "([^"]+)".*/\1/p' app/build.gradle | head -n1)"
          CURRENT_VERSION_CODE="$(sed -n -E 's/^[[:space:]]*versionCode ([0-9]+).*/\1/p' app/build.gradle | head -n1)"

          if [[ -z "${CURRENT_VERSION_NAME}" || -z "${CURRENT_VERSION_CODE}" ]]; then
            echo "::error::Unable to find current versionName/versionCode in app/build.gradle."
            exit 1
          fi

          PREVIOUS_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"

          if [[ -n "${INPUT_TAG}" ]]; then
            if [[ ! "${INPUT_TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version_tag '${INPUT_TAG}'. Expected format MAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH."
              exit 1
            fi
            if [[ "${INPUT_TAG}" == v* ]]; then
              RELEASE_TAG="${INPUT_TAG}"
            else
              RELEASE_TAG="v${INPUT_TAG}"
            fi
          else
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              BASE_VERSION="${PREVIOUS_TAG#v}"
            elif [[ "${CURRENT_VERSION_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              BASE_VERSION="${CURRENT_VERSION_NAME}"
            else
              BASE_VERSION="0.1.0"
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
            PATCH="$((PATCH + 1))"
            RELEASE_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Tag '${RELEASE_TAG}' already exists. Refusing to overwrite it."
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release '${RELEASE_TAG}' already exists. Refusing to overwrite it."
            exit 1
          fi

          RELEASE_VERSION_NAME="${RELEASE_TAG#v}"
          RELEASE_VERSION_CODE="$((CURRENT_VERSION_CODE + 1))"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version_name=${RELEASE_VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version_code=${RELEASE_VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update Android version metadata
        shell: bash
        run: |
          set -euo pipefail
          sed -i -E "0,/^([[:space:]]*)versionName \".*\"/s//\1versionName \"${{ steps.version.outputs.release_version_name }}\"/" app/build.gradle
          sed -i -E "0,/^([[:space:]]*)versionCode [0-9]+/s//\1versionCode ${{ steps.version.outputs.release_version_code }}/" app/build.gradle

      - name: Commit version metadata locally
        id: version_commit
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- app/build.gradle; then
            echo "::error::Version metadata did not change; refusing to continue."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "chore(release): prepare ${RELEASE_TAG}"

          RELEASE_COMMIT_SHA="$(git rev-parse HEAD)"
          echo "release_commit_sha=${RELEASE_COMMIT_SHA}" >> "$GITHUB_OUTPUT"


      - name: Push release version commit
        shell: bash
        env:
          RELEASE_COMMIT_SHA: ${{ steps.version_commit.outputs.release_commit_sha }}
        run: |
          set -euo pipefail

          git fetch origin "${GITHUB_REF_NAME}" --tags
          REMOTE_HEAD="$(git rev-parse "origin/${GITHUB_REF_NAME}")"
          RELEASE_PARENT_SHA="$(git rev-parse "${RELEASE_COMMIT_SHA}^")"

          if [[ "${RELEASE_PARENT_SHA}" != "${REMOTE_HEAD}" ]]; then
            echo "::error::Remote ${GITHUB_REF_NAME} moved while preparing the release commit."
            echo "::error::Release commit parent: ${RELEASE_PARENT_SHA}"
            echo "::error::Remote head:           ${REMOTE_HEAD}"
            echo "::error::Abort before building signed APKs. Re-run the workflow from the latest ${GITHUB_REF_NAME}."
            exit 1
          fi

          git push origin "${RELEASE_COMMIT_SHA}:refs/heads/${GITHUB_REF_NAME}"
          git fetch origin "${GITHUB_REF_NAME}"
          PUSHED_SHA="$(git rev-parse "origin/${GITHUB_REF_NAME}")"

          if [[ "${PUSHED_SHA}" != "${RELEASE_COMMIT_SHA}" ]]; then
            echo "::error::Pushed release commit verification failed."
            echo "::error::Expected remote head: ${RELEASE_COMMIT_SHA}"
            echo "::error::Actual remote head:   ${PUSHED_SHA}"
            exit 1
          fi

          echo "Release version commit pushed to ${GITHUB_REF_NAME}: ${RELEASE_COMMIT_SHA}"
      - name: Validate signing secrets and decode keystore
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          [[ -z "${KEYSTORE_BASE64}" ]] && missing+=("KEYSTORE_BASE64")
          [[ -z "${KEYSTORE_PASSWORD}" ]] && missing+=("KEYSTORE_PASSWORD")
          [[ -z "${KEY_ALIAS}" ]] && missing+=("KEY_ALIAS")
          [[ -z "${KEY_PASSWORD}" ]] && missing+=("KEY_PASSWORD")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required release signing secrets: ${missing[*]}"
            exit 1
          fi

          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_ALIAS}"
          echo "::add-mask::${KEY_PASSWORD}"

          KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
          printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          chmod 600 "${KEYSTORE_PATH}"
          echo "keystore_path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        shell: bash
        env:
          ORG_GRADLE_PROJECT_releaseStoreFile: ${{ steps.signing.outputs.keystore_path }}
          ORG_GRADLE_PROJECT_releaseStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_releaseKeyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_releaseKeyPassword: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace :app:assembleStandardRelease :app:assembleTopwayTwMusicRelease

      - name: Validate TS18 APK reference contracts
        shell: bash
        run: bash ./scripts/check-ts18-apk-reference-contracts.sh

      - name: Validate release APK compatibility contracts
        shell: bash
        run: bash ./scripts/check-dofun-topway-compat.sh

      - name: Locate, verify, and rename signed APKs
        id: apks
        shell: bash
        run: |
          set -euo pipefail

          declare -A variant_dirs=(
            [standard]="app/build/outputs/apk/standard/release"
            [topway_twmusic]="app/build/outputs/apk/topwayTwMusic/release"
          )
          declare -A asset_names=(
            [standard]="Auxio-TS-${{ steps.version.outputs.release_tag }}-standard-release.apk"
            [topway_twmusic]="Auxio-TS-${{ steps.version.outputs.release_tag }}-topway-twmusic-release.apk"
          )

          BUILD_TOOLS_DIR="$(find "${ANDROID_HOME}"/build-tools -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"
          if [[ ! -x "${APKSIGNER}" ]]; then
            echo "::error::apksigner was not found under ANDROID_HOME build-tools."
            exit 1
          fi

          asset_paths=()
          asset_names_out=()
          for variant in standard topway_twmusic; do
            apk_dir="${variant_dirs[$variant]}"
            mapfile -t APKS < <(find "${apk_dir}" -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*' | sort)
            if (( ${#APKS[@]} == 0 )); then
              echo "::error::Could not find a signed ${variant} release APK in ${apk_dir}."
              exit 1
            fi
            if (( ${#APKS[@]} > 1 )); then
              printf '::error::Found multiple plausible signed %s release APKs; refusing to choose automatically:\n' "${variant}"
              printf '%s\n' "${APKS[@]}"
              exit 1
            fi

            apk_path="${APKS[0]}"
            "${APKSIGNER}" verify --verbose "${apk_path}"
            asset_name="${asset_names[$variant]}"
            asset_path="${RUNNER_TEMP}/${asset_name}"
            cp "${apk_path}" "${asset_path}"
            asset_paths+=("${asset_path}")
            asset_names_out+=("${asset_name}")
          done

          {
            printf 'apk_paths<<EOF\n'
            printf '%s\n' "${asset_paths[@]}"
            printf 'EOF\n'
            printf 'apk_names<<EOF\n'
            printf '%s\n' "${asset_names_out[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Push release tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          git fetch origin --tags
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Local tag '${RELEASE_TAG}' already exists. Refusing to overwrite it."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Remote tag '${RELEASE_TAG}' already exists. Refusing to overwrite it."
            exit 1
          fi

          git tag "${RELEASE_TAG}" "${{ steps.version_commit.outputs.release_commit_sha }}"
          git push origin "refs/tags/${RELEASE_TAG}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release '${RELEASE_TAG}' already exists after tag push; aborting."
            exit 1
          fi

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_COMMIT_SHA: ${{ steps.version_commit.outputs.release_commit_sha }}
        run: |
          set -euo pipefail

          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          start_seconds="$(date +%s)"
          echo "Generating release notes for ${RELEASE_TAG} (previous tag: ${PREVIOUS_TAG:-<none>})"

          # Build args for generated-notes API; omit previous_tag_name when absent
          gh_api_args=(-f tag_name="${RELEASE_TAG}")
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            gh_api_args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          # Attempt a single GitHub generated-notes API call
          GENERATED_BODY=""
          if GENERATED_BODY="$(gh api --method POST \
              "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              "${gh_api_args[@]}" \
              --jq '.body // empty' 2>/dev/null)" \
             && [[ -n "${GENERATED_BODY}" ]]; then
            echo "GitHub generated release notes successfully."
          else
            echo "::warning::GitHub generated release notes API returned empty or failed; using git log fallback."
            GENERATED_BODY=""
          fi

          {
            echo "## What's changed"
            echo
            if [[ -n "${GENERATED_BODY}" ]]; then
              # Strip GitHub's own heading ("## What's Changed") to avoid duplication
              printf '%s\n' "${GENERATED_BODY}" | grep -viE "^## What's [Cc]hanged"
            else
              # Fallback: local git log, no API calls
              # When no previous tag exists, cap at 100 commits to keep notes concise
              if [[ -n "${PREVIOUS_TAG}" ]]; then
                git log --reverse \
                  --pretty=format:"- [%s](https://github.com/${GITHUB_REPOSITORY}/commit/%H) by %an" \
                  "${PREVIOUS_TAG}..${RELEASE_TAG}"
              else
                git log --reverse --max-count=100 \
                  --pretty=format:"- [%s](https://github.com/${GITHUB_REPOSITORY}/commit/%H) by %an" \
                  "${RELEASE_TAG}"
              fi
            fi
          } > "${NOTES_FILE}"

          # Guarantee at least one bullet when generated notes are empty/absent
          if ! grep -qE '^- ' "${NOTES_FILE}"; then
            printf -- "- [Release commit](https://github.com/%s/commit/%s) by @github-actions[bot]\n" \
              "${GITHUB_REPOSITORY}" "${RELEASE_COMMIT_SHA}" >> "${NOTES_FILE}"
          fi

          {
            echo
            echo "## APK variants"
            echo
            echo "- `Auxio-TS-${RELEASE_TAG}-standard-release.apk` keeps the normal Auxio-TS package identity (`org.oxycblt.auxio`)."
            echo "- `Auxio-TS-${RELEASE_TAG}-topway-twmusic-release.apk` is the Topway/DoFun compatibility APK and installs as `com.tw.music`; it may conflict with a stock `com.tw.music` package already installed on a head unit."
          } >> "${NOTES_FILE}"

          echo "Release notes generated in $(( $(date +%s) - start_seconds )) seconds"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload signed APK
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          APK_PATHS: ${{ steps.apks.outputs.apk_paths }}
          APK_NAMES: ${{ steps.apks.outputs.apk_names }}
          IS_DRAFT: ${{ inputs.draft }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          release_args=()
          if [[ "${IS_DRAFT}" == "true" ]]; then
            release_args+=("--draft")
          fi
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            release_args+=("--prerelease")
          fi
          release_extra_args=()
          if (( ${#release_args[@]} > 0 )); then
            release_extra_args=("${release_args[@]}")
          fi

          mapfile -t asset_paths <<< "${APK_PATHS}"
          mapfile -t asset_names <<< "${APK_NAMES}"
          release_assets=()
          for i in "${!asset_paths[@]}"; do
            release_assets+=("${asset_paths[$i]}#${asset_names[$i]}")
          done

          gh release create "${RELEASE_TAG}" "${release_assets[@]}" \
            --title "${RELEASE_TAG}" \
            --notes-file "${RELEASE_NOTES_FILE}" \
            --verify-tag \
            "${release_extra_args[@]}"

          RELEASE_URL="$(gh release view "${RELEASE_TAG}" --json url --jq '.url')"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Auxio-TS release"
            echo
            echo "- Tag: \`${{ steps.version.outputs.release_tag }}\`"
            echo "- Version name: \`${{ steps.version.outputs.release_version_name }}\`"
            echo "- Version code: \`${{ steps.version.outputs.release_version_code }}\`"
            echo "- Draft: \`${{ inputs.draft }}\`"
            echo "- Prerelease: \`${{ inputs.prerelease }}\`"
            echo "- APKs:"
            while IFS= read -r apk_name; do
              [ -n "${apk_name}" ] && echo "  - \`${apk_name}\`"
            done <<< "${{ steps.apks.outputs.apk_names }}"
            echo "- Release: [${{ steps.version.outputs.release_tag }}](${{ steps.release.outputs.release_url }})"
          } >> "$GITHUB_STEP_SUMMARY"
