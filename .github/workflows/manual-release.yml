name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: "Release tag, e.g. v1.2.3. Leave blank to auto-increment."
        required: false
        type: string
      draft:
        description: "Create release as draft"
        required: true
        default: true
        type: boolean
      prerelease:
        description: "Mark release as prerelease"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true
          submodules: recursive

      - name: Verify submodules before Gradle
        shell: bash
        run: |
          set -euo pipefail
          git submodule status --recursive
          bash scripts/check-submodules.sh

      - name: Verify branch release context
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" != "branch" ]]; then
            echo "::error::Manual releases must run from a branch so the workflow can commit version metadata before tagging."
            exit 1
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK components
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "build-tools;36.0.0" \
            "platforms;android-36" \
            "ndk;28.2.13676358"

      - name: Verify Android SDK tooling
        shell: bash
        run: |
          set -euo pipefail
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          which sdkmanager || true
          sdkmanager --list_installed || true
          which apksigner || true
          if ! command -v apksigner >/dev/null 2>&1; then
            BUILD_TOOLS_APKSIGNER="$(find "${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}/build-tools" -mindepth 2 -maxdepth 2 -type f -name apksigner 2>/dev/null | sort -V | tail -n1 || true)"
            if [[ -n "${BUILD_TOOLS_APKSIGNER}" ]]; then
              echo "apksigner located at ${BUILD_TOOLS_APKSIGNER}"
            else
              echo "::error::apksigner is unavailable after Android SDK setup."
              exit 1
            fi
          fi

      - name: Ensure native build tools are present
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Compute release version and check collisions
        id: version
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          INPUT_VERSION_TAG: ${{ inputs.version_tag }}
        run: |
          set -euo pipefail

          INPUT_TAG="$(printf '%s' "${INPUT_VERSION_TAG}" | xargs)"
          CURRENT_VERSION_NAME="$(sed -n -E 's/^[[:space:]]*versionName "([^"]+)".*/\1/p' app/build.gradle | head -n1)"
          CURRENT_VERSION_CODE="$(sed -n -E 's/^[[:space:]]*versionCode ([0-9]+).*/\1/p' app/build.gradle | head -n1)"

          if [[ -z "${CURRENT_VERSION_NAME}" || -z "${CURRENT_VERSION_CODE}" ]]; then
            echo "::error::Unable to find current versionName/versionCode in app/build.gradle."
            exit 1
          fi

          PREVIOUS_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1 || true)"

          if [[ -n "${INPUT_TAG}" ]]; then
            if [[ ! "${INPUT_TAG}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version_tag '${INPUT_TAG}'. Expected format MAJOR.MINOR.PATCH or vMAJOR.MINOR.PATCH."
              exit 1
            fi
            if [[ "${INPUT_TAG}" == v* ]]; then
              RELEASE_TAG="${INPUT_TAG}"
            else
              RELEASE_TAG="v${INPUT_TAG}"
            fi
          else
            if [[ -n "${PREVIOUS_TAG}" ]]; then
              BASE_VERSION="${PREVIOUS_TAG#v}"
            elif [[ "${CURRENT_VERSION_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              BASE_VERSION="${CURRENT_VERSION_NAME}"
            else
              BASE_VERSION="0.1.0"
            fi

            IFS='.' read -r MAJOR MINOR PATCH <<< "${BASE_VERSION}"
            PATCH="$((PATCH + 1))"
            RELEASE_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          fi

          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "::error::Tag '${RELEASE_TAG}' already exists. Refusing to overwrite it."
            exit 1
          fi
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release '${RELEASE_TAG}' already exists. Refusing to overwrite it."
            exit 1
          fi

          RELEASE_VERSION_NAME="${RELEASE_TAG#v}"
          RELEASE_VERSION_CODE="$((CURRENT_VERSION_CODE + 1))"

          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_version_name=${RELEASE_VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_version_code=${RELEASE_VERSION_CODE}" >> "$GITHUB_OUTPUT"
          echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"

      - name: Update Android version metadata
        shell: bash
        run: |
          set -euo pipefail
          sed -i -E "0,/^([[:space:]]*)versionName \".*\"/s//\1versionName \"${{ steps.version.outputs.release_version_name }}\"/" app/build.gradle
          sed -i -E "0,/^([[:space:]]*)versionCode [0-9]+/s//\1versionCode ${{ steps.version.outputs.release_version_code }}/" app/build.gradle

      - name: Commit version metadata locally
        id: version_commit
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail

          if git diff --quiet -- app/build.gradle; then
            echo "::error::Version metadata did not change; refusing to continue."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle
          git commit -m "chore(release): prepare ${RELEASE_TAG}"

          RELEASE_COMMIT_SHA="$(git rev-parse HEAD)"
          echo "release_commit_sha=${RELEASE_COMMIT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Validate signing secrets and decode keystore
        id: signing
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          [[ -z "${KEYSTORE_BASE64}" ]] && missing+=("KEYSTORE_BASE64")
          [[ -z "${KEYSTORE_PASSWORD}" ]] && missing+=("KEYSTORE_PASSWORD")
          [[ -z "${KEY_ALIAS}" ]] && missing+=("KEY_ALIAS")
          [[ -z "${KEY_PASSWORD}" ]] && missing+=("KEY_PASSWORD")

          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required release signing secrets: ${missing[*]}"
            exit 1
          fi

          echo "::add-mask::${KEYSTORE_PASSWORD}"
          echo "::add-mask::${KEY_ALIAS}"
          echo "::add-mask::${KEY_PASSWORD}"

          KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
          printf '%s' "${KEYSTORE_BASE64}" | base64 --decode > "${KEYSTORE_PATH}"
          chmod 600 "${KEYSTORE_PATH}"
          echo "keystore_path=${KEYSTORE_PATH}" >> "$GITHUB_OUTPUT"

      - name: Build signed release APK
        shell: bash
        env:
          ORG_GRADLE_PROJECT_releaseStoreFile: ${{ steps.signing.outputs.keystore_path }}
          ORG_GRADLE_PROJECT_releaseStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_releaseKeyAlias: ${{ secrets.KEY_ALIAS }}
          ORG_GRADLE_PROJECT_releaseKeyPassword: ${{ secrets.KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace :app:assembleRelease

      - name: Locate, verify, and rename signed APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t APKS < <(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' ! -name '*unsigned*' | sort)
          if (( ${#APKS[@]} == 0 )); then
            echo "::error::Could not find a signed release APK in app/build/outputs/apk/release."
            exit 1
          fi
          if (( ${#APKS[@]} > 1 )); then
            printf '::error::Found multiple plausible signed release APKs; refusing to choose automatically:\n'
            printf '%s\n' "${APKS[@]}"
            exit 1
          fi

          APK_PATH="${APKS[0]}"
          BUILD_TOOLS_DIR="$(find "${ANDROID_HOME}/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n1)"
          APKSIGNER="${BUILD_TOOLS_DIR}/apksigner"
          if [[ ! -x "${APKSIGNER}" ]]; then
            echo "::error::apksigner was not found under ANDROID_HOME build-tools."
            exit 1
          fi
          "${APKSIGNER}" verify --verbose "${APK_PATH}"

          ASSET_NAME="Auxio-TS-${{ steps.version.outputs.release_tag }}-release.apk"
          ASSET_PATH="${RUNNER_TEMP}/${ASSET_NAME}"
          cp "${APK_PATH}" "${ASSET_PATH}"

          echo "apk_path=${ASSET_PATH}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${ASSET_NAME}" >> "$GITHUB_OUTPUT"

      - name: Push version commit and tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
        run: |
          set -euo pipefail
          git push origin "HEAD:${GITHUB_REF_NAME}"
          git tag "${RELEASE_TAG}" "${{ steps.version_commit.outputs.release_commit_sha }}"
          git push origin "refs/tags/${RELEASE_TAG}"
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "::error::Release '${RELEASE_TAG}' already exists after tag push; aborting."
            exit 1
          fi

      - name: Generate release notes
        id: notes
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          PREVIOUS_TAG: ${{ steps.version.outputs.previous_tag }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_COMMIT_SHA: ${{ steps.version_commit.outputs.release_commit_sha }}
        run: |
          set -euo pipefail

          NOTES_FILE="${RUNNER_TEMP}/release-notes.md"
          start_seconds="$(date +%s)"
          echo "Generating release notes for ${RELEASE_TAG} (previous tag: ${PREVIOUS_TAG:-<none>})"

          # Build args for generated-notes API; omit previous_tag_name when absent
          gh_api_args=(-f tag_name="${RELEASE_TAG}")
          if [[ -n "${PREVIOUS_TAG}" ]]; then
            gh_api_args+=(-f "previous_tag_name=${PREVIOUS_TAG}")
          fi

          # Attempt a single GitHub generated-notes API call
          GENERATED_BODY=""
          if GENERATED_BODY="$(gh api --method POST \
              "/repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
              "${gh_api_args[@]}" \
              --jq '.body // empty' 2>/dev/null)" \
             && [[ -n "${GENERATED_BODY}" ]]; then
            echo "GitHub generated release notes successfully."
          else
            echo "::warning::GitHub generated release notes API returned empty or failed; using git log fallback."
            GENERATED_BODY=""
          fi

          {
            echo "## What's changed"
            echo
            if [[ -n "${GENERATED_BODY}" ]]; then
              # Strip any leading What's Changed heading to avoid duplication
              printf '%s\n' "${GENERATED_BODY}" | grep -viE '^## What.s changed'
            else
              # Fallback: local git log, no API calls, capped at 100 commits
              if [[ -n "${PREVIOUS_TAG}" ]]; then
                git log --reverse \
                  --pretty=format:"- [%s](https://github.com/${GITHUB_REPOSITORY}/commit/%H) by %an" \
                  "${PREVIOUS_TAG}..${RELEASE_TAG}"
              else
                git log --reverse --max-count=100 \
                  --pretty=format:"- [%s](https://github.com/${GITHUB_REPOSITORY}/commit/%H) by %an" \
                  "${RELEASE_TAG}"
              fi
            fi
          } > "${NOTES_FILE}"

          # Guarantee at least one bullet when generated notes are empty/absent
          if ! grep -qE '^- ' "${NOTES_FILE}"; then
            printf -- "- [Release commit](https://github.com/%s/commit/%s) by @github-actions[bot]\n" \
              "${GITHUB_REPOSITORY}" "${RELEASE_COMMIT_SHA}" >> "${NOTES_FILE}"
          fi

          echo "Release notes generated in $(( $(date +%s) - start_seconds )) seconds"
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload signed APK
        id: release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.release_tag }}
          RELEASE_NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
          APK_PATH: ${{ steps.apk.outputs.apk_path }}
          APK_NAME: ${{ steps.apk.outputs.apk_name }}
          IS_DRAFT: ${{ inputs.draft }}
          IS_PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          release_args=()
          if [[ "${IS_DRAFT}" == "true" ]]; then
            release_args+=("--draft")
          fi
          if [[ "${IS_PRERELEASE}" == "true" ]]; then
            release_args+=("--prerelease")
          fi
          release_extra_args=()
          if (( ${#release_args[@]} > 0 )); then
            release_extra_args=("${release_args[@]}")
          fi

          gh release create "${RELEASE_TAG}" "${APK_PATH}#${APK_NAME}" \
            --title "${RELEASE_TAG}" \
            --notes-file "${RELEASE_NOTES_FILE}" \
            --verify-tag \
            "${release_extra_args[@]}"

          RELEASE_URL="$(gh release view "${RELEASE_TAG}" --json url --jq '.url')"
          echo "release_url=${RELEASE_URL}" >> "$GITHUB_OUTPUT"

      - name: Write release summary
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "# Auxio-TS release"
            echo
            echo "- Tag: \`${{ steps.version.outputs.release_tag }}\`"
            echo "- Version name: \`${{ steps.version.outputs.release_version_name }}\`"
            echo "- Version code: \`${{ steps.version.outputs.release_version_code }}\`"
            echo "- Draft: \`${{ inputs.draft }}\`"
            echo "- Prerelease: \`${{ inputs.prerelease }}\`"
            echo "- APK: \`${{ steps.apk.outputs.apk_name }}\`"
            echo "- Release: [${{ steps.version.outputs.release_tag }}](${{ steps.release.outputs.release_url }})"
          } >> "$GITHUB_STEP_SUMMARY"
