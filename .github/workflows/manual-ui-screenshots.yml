name: Manual UI Screenshots

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: Branch, tag, or commit SHA to capture screenshots from
        required: true
        default: dev
      scenario:
        description: Capture scenario to run
        required: true
        default: all
        type: choice
        options:
          - all
          - playback_landscape
          - queue_landscape
          - home_landscape
      upload_apk:
        description: Upload debug APK artifact
        required: true
        default: false
        type: boolean
      pr_number:
        description: Optional PR number for sticky artifact comment
        required: false
        default: ""
      comment_on_pr:
        description: Post or update sticky PR artifact comment
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

jobs:
  capture-ui-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      TARGET_REF: ${{ inputs.target_ref }}
      SCENARIO: ${{ inputs.scenario }}
      UPLOAD_APK: ${{ inputs.upload_apk }}

    steps:
      - name: Checkout target ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Write local.properties
        run: |
          if [[ -z "${ANDROID_HOME:-}" ]]; then
            echo "ANDROID_HOME is not set" >&2
            exit 1
          fi
          printf 'sdk.dir=%s\n' "$ANDROID_HOME" > local.properties

      - name: Prepare CI environment
        run: bash ./scripts/prepare-ci-environment.sh

      - name: Check submodules
        run: bash ./scripts/check-submodules.sh

      - name: Build debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Capture UI screenshots
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_5
          ram-size: 4096M
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          script: |
            set -euo pipefail
            APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
            adb install -r "$APK_PATH"
            OUT_DIR="artifacts/ui-screenshots" \
            PACKAGE="org.oxycblt.auxio.debug" \
            SCENARIO="${{ inputs.scenario }}" \
            WAIT_SECONDS="4" \
            bash ./scripts/capture-ui-screenshots.sh

      - name: Upload screenshots
        id: upload_screens
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-ui-screenshots
          path: artifacts/ui-screenshots/*.png
          if-no-files-found: error
          retention-days: 20

      - name: Upload screenshot logs
        id: upload_logs
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-ui-screenshot-logs
          path: artifacts/ui-screenshots/*.txt
          if-no-files-found: error
          retention-days: 20

      - name: Upload debug APK
        id: upload_apk
        if: ${{ inputs.upload_apk }}
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 20

      - name: Resolve PR number for comment
        id: resolve_pr
        if: ${{ inputs.comment_on_pr }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_input='${{ inputs.pr_number }}'
          pr_number="${pr_input// /}"

          if [[ -z "$pr_number" ]]; then
            pr_number=$(gh pr list --state open --head "${{ github.repository_owner }}:${{ inputs.target_ref }}" --json number --jq '.[0].number' || true)
          fi

          if [[ -z "$pr_number" ]]; then
            echo "pr_number=" >> "$GITHUB_OUTPUT"
            echo "warning=comment_on_pr=true but no PR found. Provide pr_number input for manual dispatch." >> "$GITHUB_OUTPUT"
          else
            echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          fi

      - name: Write workflow summary
        id: summary
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SCREEN_URL: ${{ steps.upload_screens.outputs.artifact-url }}
          LOG_URL: ${{ steps.upload_logs.outputs.artifact-url }}
          APK_URL: ${{ steps.upload_apk.outputs.artifact-url }}
        run: |
          set -euo pipefail
          {
            echo "## Auxio-TS UI Screenshot Artifacts"
            echo
            echo "- Target ref: \\`${{ inputs.target_ref }}\\`"
            echo "- Scenario: \\`${{ inputs.scenario }}\\`"
            echo "- Run: ${RUN_URL}"
            echo "- APK upload requested: \\`${{ inputs.upload_apk }}\\`"
            echo
            echo "| Artifact | Link | Contents | Retention |"
            echo "|---|---|---|---|"
            echo "| auxio-ts-ui-screenshots | ${SCREEN_URL:-not available} | PNG screenshots | 20 days |"
            echo "| auxio-ts-ui-screenshot-logs | ${LOG_URL:-not available} | logcat/dumpsys/window/activity/package diagnostics | 20 days |"
            if [[ '${{ inputs.upload_apk }}' == 'true' ]]; then
              echo "| auxio-ts-debug-apk | ${APK_URL:-not available} | app/build/outputs/apk/debug/app-debug.apk | 20 days |"
            else
              echo "| auxio-ts-debug-apk | not produced | upload_apk=false | 20 days (when produced) |"
            fi
            if [[ -n '${{ steps.resolve_pr.outputs.warning }}' ]]; then
              echo
              echo ":warning: ${{ steps.resolve_pr.outputs.warning }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment with artifact links
        if: ${{ inputs.comment_on_pr && steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SCREEN_URL: ${{ steps.upload_screens.outputs.artifact-url }}
          LOG_URL: ${{ steps.upload_logs.outputs.artifact-url }}
          APK_URL: ${{ steps.upload_apk.outputs.artifact-url }}
        run: |
          set -euo pipefail
          marker='<!-- auxio-ts-ui-screenshots -->'
          body_file="$(mktemp)"
          {
            echo "$marker"
            echo "## Auxio-TS UI Screenshot Artifacts"
            echo
            echo "- Target ref: \\`${{ inputs.target_ref }}\\`"
            echo "- Scenario: \\`${{ inputs.scenario }}\\`"
            echo "- Run: ${RUN_URL}"
            echo
            echo "| Artifact | Link | Contents | Retention |"
            echo "|---|---|---|---|"
            echo "| auxio-ts-ui-screenshots | ${SCREEN_URL:-not available} | PNG screenshots | 20 days |"
            echo "| auxio-ts-ui-screenshot-logs | ${LOG_URL:-not available} | logcat/dumpsys/window/activity/package diagnostics | 20 days |"
            if [[ '${{ inputs.upload_apk }}' == 'true' ]]; then
              echo "| auxio-ts-debug-apk | ${APK_URL:-not available} | app/build/outputs/apk/debug/app-debug.apk | 20 days |"
            else
              echo "| auxio-ts-debug-apk | not produced | upload_apk=false | 20 days (when produced) |"
            fi
          } > "$body_file"

          comment_id=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --jq '.[] | select(.body | contains("<!-- auxio-ts-ui-screenshots -->")) | .id' | head -n1 || true)
          if [[ -n "$comment_id" ]]; then
            jq -n --rawfile body "$body_file" '{"body": $body}' | \
              gh api --method PATCH "repos/${{ github.repository }}/issues/comments/${comment_id}" --input - >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$body_file" >/dev/null
          fi
