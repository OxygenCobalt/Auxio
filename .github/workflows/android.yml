name: Android Build

on:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Verify and validate submodule state
      shell: bash
      run: |
        # Ensure .gitmodules URLs are in sync (safe; no-op if already correct)
        git submodule sync --recursive
        # Retry submodule init/update after checkout action — defensive; || true because
        # git.ffmpeg.org may be unreachable in restricted environments (sandbox/air-gapped).
        # check-submodules.sh below will fail with SUBMODULE_BLOCKER if ffmpeg is required.
        git submodule update --init --recursive --jobs 4 || true
        # Display current state for CI log diagnostics
        echo "--- git submodule status --recursive ---"
        git submodule status --recursive
        # Validate required paths — fails early with SUBMODULE_BLOCKER on missing files
        bash ./scripts/check-submodules.sh
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Patch media submodule - create missing proguard-rules.txt files
      run: |
        # media/libraries/common_ktx/proguard-rules.txt is required by common_library_config.gradle
        # (consumerProguardFiles 'proguard-rules.txt') but is absent from the submodule at
        # commit 0b01e32 ("remove deprecated ndk dir use"). Create an empty stub so Gradle
        # can merge the consumer proguard config without failing.
        # See: OxygenCobalt/media common_library_config.gradle line 25
        if [[ -d media/libraries/common_ktx ]] && [[ ! -f media/libraries/common_ktx/proguard-rules.txt ]]; then
          touch media/libraries/common_ktx/proguard-rules.txt
          echo "Created stub media/libraries/common_ktx/proguard-rules.txt"
        fi
    - name: Build debug APK with Gradle
      run: ./gradlew --no-daemon --stacktrace assembleDebug
    - name: Upload debug APK artifact
      if: github.event_name != 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: Auxio_Canary
        path: ./app/build/outputs/apk/debug/app-debug.apk
