name: Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
      - 'scripts/prepare-ci-environment.sh'
      - 'scripts/check-submodules.sh'
      - 'scripts/check-headunit-compat-safety.sh'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
      - 'scripts/prepare-ci-environment.sh'
      - 'scripts/check-submodules.sh'
      - 'scripts/check-headunit-compat-safety.sh'

permissions:
  contents: read

env:
  # Force Node.js 20 actions to run on Node.js 24 while upstream action releases
  # catch up.  Remove once setup-java and setup-gradle natively target Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        # fetch-depth: 0 (full history) is required here.
        # The nested ffmpeg submodule resolves from git.ffmpeg.org via an
        # unadvertised object reference.  Shallow clones (fetch-depth: 1)
        # cause "unadvertised object" fetch errors during recursive submodule
        # init.  Full history ensures the referenced commit is always reachable.
        fetch-depth: 0
        submodules: recursive
    - name: Prepare CI environment
      shell: bash
      run: bash ./scripts/prepare-ci-environment.sh
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Write local.properties for Android SDK
      shell: bash
      run: |
        set -euo pipefail
        sdk_dir="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
        if [ -z "${sdk_dir}" ]; then
          echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT is not set."
          exit 1
        fi
        printf 'sdk.dir=%s\n' "${sdk_dir}" > local.properties
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # PRs must not write to the shared Gradle cache; pushes to dev may write.
        cache-read-only: ${{ github.event_name == 'pull_request' }}
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Build debug APK with Gradle
      run: ./gradlew --no-daemon --stacktrace :app:assembleDebug
    - name: Upload build reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: android-build-reports
        path: |
          app/build/reports/**
          build/reports/problems/**
        if-no-files-found: ignore
        retention-days: 7
    - name: Upload debug APK artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: auxio-ts-debug-apk
        path: ./app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 7
