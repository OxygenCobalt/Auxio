name: Android Quality

on:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Run formatting, unit tests, and Android lint
      run: ./gradlew --no-daemon --stacktrace --continue spotlessCheck testDebugUnitTest lintDebug
