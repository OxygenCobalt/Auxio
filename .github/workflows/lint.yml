name: Android Quality

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
      - 'scripts/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/**'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
      - 'scripts/**'
      - 'AGENTS.md'
      - 'README.md'
      - 'docs/**'

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  workflow-syntax:
    name: Workflow/script syntax
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Validate workflow YAML
      shell: bash
      run: |
        ruby -e 'require "yaml"; ARGV.each { |f| Psych.safe_load(File.read(f), permitted_classes: [], permitted_symbols: [], aliases: false); puts "OK #{f}" }' .github/workflows/*.yml
    - name: Validate shell script syntax
      shell: bash
      run: find scripts -type f -name '*.sh' -print -exec bash -n {} \;

  format:
    name: Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        # fetch-depth: 0 (full history) is required here.
        # The nested ffmpeg submodule resolves from git.ffmpeg.org via an
        # unadvertised object reference.  Shallow clones (fetch-depth: 1)
        # cause "unadvertised object" fetch errors during recursive submodule
        # init.  Full history ensures the referenced commit is always reachable.
        fetch-depth: 0
        submodules: recursive
        persist-credentials: false
    - name: Prepare CI environment
      shell: bash
      run: bash ./scripts/prepare-ci-environment.sh
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Write local.properties for Android SDK
      shell: bash
      run: |
        set -euo pipefail
        sdk_dir="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
        if [ -z "${sdk_dir}" ]; then
          echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT is not set."
          exit 1
        fi
        printf 'sdk.dir=%s\n' "${sdk_dir}" > local.properties
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        # PRs must not write to the shared Gradle cache; pushes to dev may write.
        cache-read-only: ${{ github.event_name == 'pull_request' }}
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Check formatting
      run: ./gradlew --no-daemon --stacktrace spotlessCheck
    - name: Upload formatting reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: android-quality-format-reports
        path: |
          build/reports/problems/**
        if-no-files-found: ignore
        retention-days: 7
    - name: Comment with manual formatter workflow link
      if: failure() && github.event_name == 'pull_request'
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/workflows/format-pr-branch.yml
      run: |
        set -euo pipefail

        marker='<!-- auxio-ts-format-pr-branch-help -->'
        body="$(mktemp)"
        cat > "${body}" <<'EOF'
        <!-- auxio-ts-format-pr-branch-help -->
        ### Formatting check failed

        The Android Quality / Formatting job failed because Spotless found formatting drift.

        Use the manual formatter workflow to apply `spotlessApply` on this PR branch:

        [Run **Format PR branch**](${WORKFLOW_URL})

        Workflow input:

        ```text
        branch=${PR_BRANCH}
        ```

        Or run from a machine with GitHub CLI:

        ```sh
        gh workflow run format-pr-branch.yml --repo ${GITHUB_REPOSITORY} -f branch=${PR_BRANCH}
        ```

        The workflow checks formatting first. If formatting is already clean, it exits without committing. If formatting is dirty, it runs `spotlessApply`, commits the formatter changes, and pushes them back to the PR branch.
        EOF

        # Expand only the intended shell variables after preserving markdown literally.
        sed -i \
          -e "s|\${WORKFLOW_URL}|${WORKFLOW_URL}|g" \
          -e "s|\${PR_BRANCH}|${PR_BRANCH}|g" \
          -e "s|\${GITHUB_REPOSITORY}|${GITHUB_REPOSITORY}|g" \
          "${body}"

        existing_id="$(
          gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | tail -n 1
        )"

        if [[ -n "${existing_id}" ]]; then
          gh api \
            --method PATCH \
            "repos/${GITHUB_REPOSITORY}/issues/comments/${existing_id}" \
            -f body@"${body}"
        else
          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            -f body@"${body}"
        fi


  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        # fetch-depth: 0 (full history) is required here.
        # The nested ffmpeg submodule resolves from git.ffmpeg.org via an
        # unadvertised object reference.  Shallow clones (fetch-depth: 1)
        # cause "unadvertised object" fetch errors during recursive submodule
        # init.  Full history ensures the referenced commit is always reachable.
        fetch-depth: 0
        submodules: recursive
        persist-credentials: false
    - name: Prepare CI environment
      shell: bash
      run: bash ./scripts/prepare-ci-environment.sh
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Write local.properties for Android SDK
      shell: bash
      run: |
        set -euo pipefail
        sdk_dir="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
        if [ -z "${sdk_dir}" ]; then
          echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT is not set."
          exit 1
        fi
        printf 'sdk.dir=%s\n' "${sdk_dir}" > local.properties
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.event_name == 'pull_request' }}
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Run unit tests
      # testDebugUnitTest is scoped to :app and :musikr only.
      # The media library test files have missing test-utility dependencies
      # (after upstream "trim down module tree") and will not compile with the
      # bare testDebugUnitTest task.
      run: ./gradlew --no-daemon --stacktrace :app:testStandardDebugUnitTest :musikr:testDebugUnitTest
    - name: Upload unit test reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: android-quality-unit-test-reports
        path: |
          app/build/reports/tests/**
          musikr/build/reports/tests/**
          build/reports/problems/**
        if-no-files-found: ignore
        retention-days: 7

  android-lint:
    name: Android lint
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        # fetch-depth: 0 (full history) is required here.
        # The nested ffmpeg submodule resolves from git.ffmpeg.org via an
        # unadvertised object reference.  Shallow clones (fetch-depth: 1)
        # cause "unadvertised object" fetch errors during recursive submodule
        # init.  Full history ensures the referenced commit is always reachable.
        fetch-depth: 0
        submodules: recursive
        persist-credentials: false
    - name: Prepare CI environment
      shell: bash
      run: bash ./scripts/prepare-ci-environment.sh
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Write local.properties for Android SDK
      shell: bash
      run: |
        set -euo pipefail
        sdk_dir="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
        if [ -z "${sdk_dir}" ]; then
          echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT is not set."
          exit 1
        fi
        printf 'sdk.dir=%s\n' "${sdk_dir}" > local.properties
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        cache-read-only: ${{ github.event_name == 'pull_request' }}
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Run Android lint
      # lintDebug is scoped to :app only.
      # app/build.gradle sets checkDependencies=false so media library lint
      # errors are not aggregated into the app report.
      # app/lint.xml suppresses lint for vendored Google Material sources.
      # :musikr lintDebug can be added once musikr lint issues are baselined.
      run: ./gradlew --no-daemon --stacktrace :app:lintStandardDebug
    - name: Upload Android lint reports
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: android-quality-lint-reports
        path: |
          app/build/reports/lint-results-*
          build/reports/problems/**
        if-no-files-found: ignore
        retention-days: 7

  headunit-safety:
    name: Head-unit safety
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
    - name: Checkout repository
      uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      with:
        fetch-depth: 0
        persist-credentials: false
    - name: Run head-unit compatibility safety checks
      shell: bash
      run: |
        bash ./scripts/check-ts18-apk-reference-contracts.sh
        bash ./scripts/check-headunit-compat-safety.sh
        bash ./scripts/check-dofun-topway-compat.sh
