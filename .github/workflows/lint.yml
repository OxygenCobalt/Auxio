name: Android Quality

on:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'media'
      - 'media/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
      - 'gradle/**'
      - 'gradlew'
      - 'gradlew.bat'
      - 'NOTICE'
      - 'eclipse-cdt.xml'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        submodules: recursive
    - name: Validate required submodules
      run: bash ./scripts/check-submodules.sh
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: "21"
        distribution: "temurin"
    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
    - name: Ensure native build tools are present
      run: |
        if ! command -v ninja >/dev/null 2>&1; then
          sudo apt-get update
          sudo apt-get install -y ninja-build
        fi
    - name: Patch media submodule - create missing proguard-rules.txt files
      run: |
        # media/libraries/common_ktx/proguard-rules.txt is required by common_library_config.gradle
        # but is absent from the submodule. Create a stub so Gradle does not fail at
        # mergeDebugConsumerProguardFiles. See android.yml for full explanation.
        if [[ -d media/libraries/common_ktx ]] && [[ ! -f media/libraries/common_ktx/proguard-rules.txt ]]; then
          touch media/libraries/common_ktx/proguard-rules.txt
          echo "Created stub media/libraries/common_ktx/proguard-rules.txt"
        fi
    - name: Run formatting, unit tests, and Android lint
      # Run tasks scoped to Auxio-TS modules only.
      # - testDebugUnitTest is scoped to :app and :musikr to avoid compile errors in media
      #   library test files (missing test-util dependencies after submodule trimming).
      # - lintDebug is scoped to :app only; media library lint issues are upstream concerns.
      run: ./gradlew --no-daemon --stacktrace --continue spotlessCheck :app:testDebugUnitTest :musikr:testDebugUnitTest :app:lintDebug
