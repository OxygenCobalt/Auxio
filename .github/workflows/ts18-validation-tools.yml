name: ts18-validation-tools
on:
  pull_request:
    paths:
      - 'docs/TS18_*'
      - 'docs/templates/TS18_*'
      - 'docs/templates/fixtures/**'
      - 'scripts/ts18-*'
      - 'scripts/test-ts18-validation-tools.sh'
      - 'scripts/ts18-validation-workflow.sh'
  push:
    paths:
      - 'docs/TS18_*'
      - 'docs/templates/TS18_*'
      - 'docs/templates/fixtures/**'
      - 'scripts/ts18-*'
      - 'scripts/test-ts18-validation-tools.sh'
      - 'scripts/ts18-validation-workflow.sh'
jobs:
  guardrail:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shell syntax
        run: find scripts -type f -name '*.sh' -print -exec bash -n {} \;
      - name: python compile
        run: python3 -m py_compile scripts/ts18-*.py
      - name: scenario map json
        run: python3 -m json.tool docs/templates/TS18_VALIDATION_SCENARIO_MAP.json >/dev/null
      - name: scenario map validation
        run: python3 scripts/ts18-validate-scenario-map.py docs/templates/TS18_VALIDATION_SCENARIO_MAP.json
      - name: product compatibility safety guardrail
        run: bash scripts/check-headunit-compat-safety.sh
      - name: fixture workflow tests
        run: bash scripts/test-ts18-validation-tools.sh
