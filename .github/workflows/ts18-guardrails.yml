name: TS18 Guardrails

on:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/ts18-guardrails.yml'
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'docs/**'
      - 'scripts/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/ts18-guardrails.yml'
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - 'app/**'
      - 'musikr/**'
      - 'docs/**'
      - 'scripts/**'
      - 'build.gradle'
      - 'settings.gradle'
      - '.gitmodules'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guardrails:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        # Intentionally does NOT use submodules: recursive — this workflow performs
        # docs/script/policy checks only. No Gradle tasks run, so media/core_settings.gradle
        # and taglib/ffmpeg submodules are not required. This keeps the job fast and avoids
        # the git.ffmpeg.org network dependency.
        uses: actions/checkout@v5

      - name: Validate repository shell scripts
        run: find scripts -type f -name '*.sh' -print -exec sh -n {} \;

      - name: Validate canonical TS18 evidence labels
        shell: bash
        run: |
          set -euo pipefail

          confidence_labels=(
            "Observed"
            "Inferred"
            "Hypothesis"
            "Requires TS18 validation"
            "Unsupported"
          )

          porting_labels=(
            "Directly reusable requirement"
            "Reusable validation idea"
            "Useful as evidence only"
            "Obsolete due to Auxio architecture"
            "Requires TS18 runtime validation"
            "Unsafe to port"
            "Should be explicitly avoided"
          )

          for label in "${confidence_labels[@]}"; do
            grep -Fq -- "- **${label}**" docs/TS18_SOURCE_LED_INTEGRATION_STRATEGY.md
          done

          for label in "${porting_labels[@]}"; do
            grep -Fq -- "- **${label}**" docs/TS18_SOURCE_LED_INTEGRATION_STRATEGY.md
          done

          grep -Fq '| 5A | Source-led integration strategy correction |' docs/DEVELOPMENT_ROADMAP.md
          grep -Fq '| 6+ | Explicit compatibility features only when justified |' docs/DEVELOPMENT_ROADMAP.md
          grep -Fq '## Related canonical docs' docs/TS18_VALIDATION_RUNBOOK.md

      - name: Validate source-led policy presence
        shell: bash
        run: |
          set -euo pipefail

          # Require the source-led policy phrase in canonical docs
          grep -Fq 'TS18/TW/TWTHEME source-led policy' docs/TS18_SOURCE_LED_INTEGRATION_STRATEGY.md
          grep -Fq 'TS18/TW/TWTHEME source-led policy' AGENTS.md
          grep -Fq 'TS18/TW/TWTHEME source-led policy' .github/copilot-instructions.md

          # Require at least one TS18/TW/TWTHEME ecosystem term in the strategy doc
          grep -Eq 'TS18/TW/TWTHEME source corpus|Topway|DoFun|TWTHEME|iLauncher' \
            docs/TS18_SOURCE_LED_INTEGRATION_STRATEGY.md

          # Require priority model in strategy doc
          grep -Fq 'Priority 1:' docs/TS18_SOURCE_LED_INTEGRATION_STRATEGY.md

      - name: Reject active probe/diagnostics-first strategy language in docs
        shell: bash
        run: |
          set -euo pipefail

          # Check docs for highly-specific probe class names that would only appear
          # if someone is actively proposing to create such infrastructure.
          # Generic terms like "adapter skeleton" appear legitimately in rejection/gate contexts
          # and are NOT checked here.
          probe_class_names=(
            "TS18IntegrationProbe"
            "TS18EnvironmentSnapshot"
            "TS18ContractRegistry"
            "TS18AdapterCapability"
            "TWUtilReflectionScanner"
            "TWClientReflectionScanner"
            "VendorPackageScanner"
            "RuntimeContractRegistry"
          )

          fail=0
          for classname in "${probe_class_names[@]}"; do
            matches=$(grep -RIn -- "${classname}" \
              docs AGENTS.md README.md .github/copilot-instructions.md \
              app/src musikr/src 2>/dev/null || true)
            if [ -n "${matches}" ]; then
              # Allow if clearly labelled as rejected/historical/reference-only
              unlabelled=$(echo "${matches}" | grep -Ev \
                'rejected|historical|reference.only|unsafe.to.port|should be explicitly avoided|Do not|do not|not add|not implement|never|archived' \
                || true)
              if [ -n "${unlabelled}" ]; then
                echo "ERROR: Active probe class name found (must be labelled as rejected/historical):"
                echo "${unlabelled}"
                fail=1
              fi
            fi
          done

          # Unconditionally reject these patterns in app source code
          if grep -RInE \
            'TS18IntegrationProbe|TS18ContractRegistry|TS18AdapterCapability|TS18EnvironmentSnapshot' \
            app/src musikr/src 2>/dev/null; then
            echo "ERROR: Probe class names found in app source code"
            fail=1
          fi

          if [ "${fail}" -eq 1 ]; then
            exit 1
          fi

      - name: Enforce Auxio-TS package and privilege guardrails
        shell: bash
        run: |
          set -euo pipefail

          ! grep -RInE 'android:sharedUserId=|android\.uid\.system' app/src musikr/src
          ! grep -RInE 'package="com\.tw\.music"|applicationId[[:space:]]+"com\.tw\.music"|namespace[[:space:]]+"com\.tw\.music"' app/build.gradle app/src/main/AndroidManifest.xml musikr/build.gradle settings.gradle

      - name: Smoke-test TS18 evidence redaction
        shell: bash
        run: |
          set -euo pipefail

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          raw_dir="${tmp_dir}/raw"
          out_dir="${tmp_dir}/redacted"
          mkdir -p "${raw_dir}"

          cat > "${raw_dir}/README.txt" <<'EOF'
          Device serial: SERIAL1234567890ABCDEF
          EOF
          cat > "${raw_dir}/selected_props.txt" <<'EOF'
          [ro.boot.serialno]: [SERIAL1234567890ABCDEF]
          other_id=ABCDEF1234567890ABCDEF1234567890
          EOF
          cat > "${raw_dir}/media_session.txt" <<'EOF'
          session_token=1234567890ABCDEF1234567890ABCDEF
          EOF

          ./scripts/redact_ts18_evidence_summary.sh "${raw_dir}" "${out_dir}"

          grep -RFn '[REDACTED]' "${out_dir}"
          grep -RFn '[HEX_OR_ID_REDACTED]' "${out_dir}"
          ! grep -RInE 'SERIAL1234567890ABCDEF|ABCDEF1234567890ABCDEF1234567890|1234567890ABCDEF1234567890ABCDEF' "${out_dir}"
