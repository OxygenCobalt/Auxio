name: TS18 Guardrails

on:
  workflow_dispatch:
  push:
    branches:
      - dev
    paths:
      - '.github/workflows/ts18-guardrails.yml'
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - '.github/copilot-instructions.md'
      - 'AGENTS.md'
      - 'README.md'
      - 'app/**'
      - 'musikr/**'
      - 'docs/**'
      - 'scripts/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.gitmodules'
  pull_request:
    branches:
      - dev
    paths:
      - '.github/workflows/ts18-guardrails.yml'
      - '.github/workflows/android.yml'
      - '.github/workflows/lint.yml'
      - '.github/copilot-instructions.md'
      - 'AGENTS.md'
      - 'README.md'
      - 'app/**'
      - 'musikr/**'
      - 'docs/**'
      - 'scripts/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle.properties'
      - '.gitmodules'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: '1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  scope-and-syntax:
    name: Scope, syntax, and static file checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        # No recursive submodules: this workflow validates TS18 docs/scripts/guardrails only.
        # Gradle/native submodules remain covered by Android Build and Android Quality.
        uses: actions/checkout@v5

      - name: Show repository state
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git diff --name-status HEAD^..HEAD || true

      - name: Validate shell scripts with matching shell
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r script; do
            [ -f "${script}" ] || continue

            first_line="$(head -n 1 "${script}" || true)"
            echo "Checking ${script} (${first_line})"

            case "${first_line}" in
              *bash*) bash -n "${script}" ;;
              *sh*) sh -n "${script}" ;;
              *) bash -n "${script}" ;;
            esac
          done < <(find scripts -type f -name '*.sh' | sort)

      - name: Validate JSON templates and maps
        shell: bash
        run: |
          set -euo pipefail

          json_files=(
            docs/templates/TS18_EVIDENCE_MANIFEST.schema.json
            docs/templates/TS18_EVIDENCE_MANIFEST.example.json
            docs/templates/TS18_VALIDATION_SCENARIO_MAP.json
          )

          for file in "${json_files[@]}"; do
            if [ -f "${file}" ]; then
              echo "Validating ${file}"
              python3 -m json.tool "${file}" >/dev/null
            else
              echo "Skipping missing optional JSON file: ${file}"
            fi
          done

      - name: Compile TS18 Python evidence tools
        shell: bash
        run: |
          set -euo pipefail

          python_files=(
            scripts/ts18-summarise-evidence-pack.py
            scripts/ts18-propose-gap-matrix-update.py
            scripts/ts18-generate-native-candidates.py
          )

          found=0
          for file in "${python_files[@]}"; do
            if [ -f "${file}" ]; then
              found=1
              echo "Compiling ${file}"
              python3 -m py_compile "${file}"
            fi
          done

          if [ "${found}" -eq 0 ]; then
            echo "No TS18 Python evidence tools present yet; skipping."
          fi

      - name: Reject unsafe shell command execution patterns
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          patterns = [
              re.compile(r'(^|[^\w])eval\s+["\']?\$', re.MULTILINE),
              re.compile(r'(^|[^\w])bash\s+-c\s+["\']?\$', re.MULTILINE),
              re.compile(r'(^|[^\w])sh\s+-c\s+["\']?\$', re.MULTILINE),
          ]

          bad = []
          for path in Path("scripts").rglob("*"):
              if not path.is_file():
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue

              for line_no, line in enumerate(text.splitlines(), 1):
                  if any(pattern.search(line) for pattern in patterns):
                      bad.append((path, line_no, line.strip()))

          if bad:
              print("ERROR: unsafe eval/sh -c/bash -c pattern found in scripts")
              for path, line_no, line in bad:
                  print(f"{path}:{line_no}: {line}")
              sys.exit(1)
          PY

      - name: Check for unresolved conflict markers
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '^(<<<<<<<|=======|>>>>>>>)' . \
            --exclude-dir=.git \
            --exclude-dir=build \
            --exclude-dir=.gradle; then
            echo "ERROR: unresolved merge conflict markers found"
            exit 1
          fi

      - name: Check for hidden or bidirectional Unicode controls
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import sys

          bad = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in {".git", "build", ".gradle"} for part in path.parts):
                  continue

              try:
                  text = path.read_text(encoding="utf-8")
              except Exception:
                  continue

              hits = []
              for line_no, line in enumerate(text.splitlines(), 1):
                  for ch in line:
                      code = ord(ch)
                      if 0x202A <= code <= 0x202E or 0x2066 <= code <= 0x2069:
                          hits.append((line_no, hex(code)))

              if hits:
                  bad.append((path, hits[:20]))

          if bad:
              for path, hits in bad:
                  print(path)
                  for line_no, code in hits:
                      print(f"  line {line_no}: {code}")
              sys.exit("ERROR: hidden/bidirectional Unicode controls found")
          PY

  strategy-docs:
    name: TS18 strategy and docs guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Validate canonical evidence labels
        shell: bash
        run: |
          set -euo pipefail

          canonical_files=(
            docs/TS18_SOURCE_LED_INTEGRATION_STRATEGY.md
            docs/TS18_INTEGRATION_ARCHITECTURE.md
          )

          confidence_labels=(
            "Observed"
            "Inferred"
            "Hypothesis"
            "Requires TS18 validation"
            "Unsupported"
          )

          porting_labels=(
            "Directly reusable requirement"
            "Reusable validation idea"
            "Useful as evidence only"
            "Obsolete due to Auxio architecture"
            "Requires TS18 runtime validation"
            "Unsafe to port"
            "Should be explicitly avoided"
          )

          for label in "${confidence_labels[@]}"; do
            if ! grep -RInF -- "${label}" "${canonical_files[@]}" >/dev/null; then
              echo "ERROR: confidence label missing from canonical docs: ${label}"
              exit 1
            fi
          done

          for label in "${porting_labels[@]}"; do
            if ! grep -RInF -- "${label}" "${canonical_files[@]}" >/dev/null; then
              echo "ERROR: porting label missing from canonical docs: ${label}"
              exit 1
            fi
          done

      - name: Validate TS18 parity strategy framing
        shell: bash
        run: |
          set -euo pipefail

          required_docs=(
            README.md
            AGENTS.md
            .github/copilot-instructions.md
            docs/README.md
            docs/DEVELOPMENT_ROADMAP.md
            docs/TS18_INTEGRATION_ARCHITECTURE.md
          )

          for file in "${required_docs[@]}"; do
            if [ ! -f "${file}" ]; then
              echo "ERROR: required guidance file missing: ${file}"
              exit 1
            fi
          done

          grep -RInF "TS18/TW/TWTHEME parity" \
            README.md AGENTS.md .github/copilot-instructions.md docs \
            >/tmp/ts18-parity-hits.txt || true

          if [ ! -s /tmp/ts18-parity-hits.txt ]; then
            echo "ERROR: TS18/TW/TWTHEME parity framing not found"
            exit 1
          fi

          grep -RInE "Tier 1|Android APIs.*first implementation|Android.*not the ceiling|Android-standard implementation" \
            README.md AGENTS.md .github/copilot-instructions.md docs \
            >/tmp/tier1-hits.txt || true

          if [ ! -s /tmp/tier1-hits.txt ]; then
            echo "ERROR: Android-as-Tier-1-not-ceiling framing not found"
            exit 1
          fi

          grep -RInE "Tier 0|Tier 1|Tier 2|Tier 3|Tier 4" \
            docs/TS18_INTEGRATION_ARCHITECTURE.md docs/DEVELOPMENT_ROADMAP.md docs/README.md \
            >/tmp/tier-hits.txt || true

          if [ ! -s /tmp/tier-hits.txt ]; then
            echo "ERROR: Tier 0→4 strategy not documented in canonical docs"
            exit 1
          fi

      - name: Reject stale Android-ceiling or permanent-native-ban wording
        shell: bash
        run: |
          set -euo pipefail

          matches="$(grep -RInE \
            'Android.*final authority|Android.*ceiling|standard Android.*complete|standard Android.*enough|private.*permanently out of scope|native.*permanently out of scope|TS18.*permanently out of scope|TWTHEME.*permanently out of scope' \
            README.md AGENTS.md .github/copilot-instructions.md docs 2>/dev/null || true)"

          if [ -z "${matches}" ]; then
            exit 0
          fi

          allowed="$(echo "${matches}" | grep -Ei \
            'not |do not |avoid |wrong|unacceptable|rejected|historical|reference-only|unsafe|future|must not|should not' \
            || true)"

          disallowed="$(comm -23 <(echo "${matches}" | sort) <(echo "${allowed}" | sort) || true)"

          if [ -n "${disallowed}" ]; then
            echo "ERROR: stale Android-ceiling/permanent-native-ban wording found:"
            echo "${disallowed}"
            exit 1
          fi

      - name: Validate parity/evidence docs exist when workflow exists
        shell: bash
        run: |
          set -euo pipefail

          if [ -f scripts/ts18-evidence-workflow.sh ]; then
            required=(
              docs/TS18_NATIVE_PARITY_GAP_MATRIX.md
              docs/TS18_STOCK_TMUSIC_PARITY_LEDGER.md
              docs/TS18_NATIVE_CONTRACT_INVENTORY.md
              docs/evidence/ts18/README.md
              docs/templates/TS18_NATIVE_INVESTIGATION_CANDIDATE.md
            )

            for file in "${required[@]}"; do
              if [ ! -f "${file}" ]; then
                echo "ERROR: evidence workflow exists but required doc/template missing: ${file}"
                exit 1
              fi
            done
          fi

  evidence-tools:
    name: TS18 evidence tooling guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run TS18 evidence tooling tests
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f scripts/test-ts18-evidence-tools.sh ]; then
            echo "No TS18 evidence test script present yet; skipping."
            exit 0
          fi

          bash scripts/test-ts18-evidence-tools.sh

      - name: Validate evidence workflow help and fixture mode
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f scripts/ts18-evidence-workflow.sh ]; then
            echo "No TS18 evidence workflow script present yet; skipping."
            exit 0
          fi

          bash scripts/ts18-evidence-workflow.sh --help

          if [ -d docs/templates/fixtures/pack-minimal-pass ]; then
            bash scripts/ts18-evidence-workflow.sh --fixture docs/templates/fixtures/pack-minimal-pass
          fi

      - name: Validate TS18 scenario map coverage
        shell: bash
        run: |
          set -euo pipefail

          map="docs/templates/TS18_VALIDATION_SCENARIO_MAP.json"

          if [ ! -f "${map}" ]; then
            echo "No TS18 validation scenario map present yet; skipping."
            exit 0
          fi

          if [ -f scripts/ts18-validate-scenario-map.py ]; then
            python3 scripts/ts18-validate-scenario-map.py "${map}"
            exit 0
          fi

          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path("docs/templates/TS18_VALIDATION_SCENARIO_MAP.json")
          data = json.loads(path.read_text())

          if isinstance(data, dict) and "scenarios" in data:
              scenarios = data["scenarios"]
          elif isinstance(data, list):
              scenarios = data
          elif isinstance(data, dict):
              scenarios = list(data.values())
          else:
              raise SystemExit("Scenario map must be a dict/list")

          ids = []
          for item in scenarios:
              if not isinstance(item, dict):
                  raise SystemExit("Scenario map entries must be objects")
              sid = item.get("id") or item.get("scenario") or item.get("scenario_id")
              if not sid:
                  raise SystemExit(f"Scenario entry missing id: {item}")
              ids.append(sid)

          expected = [f"TS18-STD-{i:03d}" for i in range(1, 18)]
          missing = sorted(set(expected) - set(ids))
          extra = sorted(set(ids) - set(expected))
          dupes = sorted({sid for sid in ids if ids.count(sid) > 1})

          if missing or extra or dupes:
              raise SystemExit(
                  f"Scenario ID mismatch\nmissing={missing}\nextra={extra}\nduplicates={dupes}"
              )

          allowed_severity = {"critical", "high", "medium", "low"}
          allowed_priority = {"none", "low", "medium", "high"}

          # PR #26 currently uses both legacy and newer field names.
          # Guard the semantic groups, not one spelling, to avoid false failures while
          # the evidence tooling and docs finish converging.
          required_groups = {
              "required evidence": ("required", "required_evidence"),
              "optional evidence": ("optional", "optional_evidence"),
              "expected signal": ("expectedSignal", "expectedSignals", "expected_signal", "expected_signals"),
              "known limitations": ("knownLimitations", "known_limitations"),
              "manual review flag": ("manualEvidenceRequired", "manualReviewRequired", "manual_review_required"),
              "parity rows": ("parityRows", "parity_matrix_rows"),
              "native trigger": ("nativeTrigger", "nativeTriggerCondition", "native_investigation_trigger"),
              "severity": ("severity",),
              "user impact": ("user_impact", "userImpact"),
              "native investigation priority": ("native_investigation_priority", "nativeInvestigationPriority"),
          }

          for item in scenarios:
              sid = item.get("id") or item.get("scenario") or item.get("scenario_id")
              missing_groups = [
                  name for name, aliases in required_groups.items()
                  if not any(alias in item for alias in aliases)
              ]
              if missing_groups:
                  raise SystemExit(f"{sid} missing required field groups: {missing_groups}")

              severity = item.get("severity")
              if severity not in allowed_severity:
                  raise SystemExit(f"{sid} has invalid severity: {severity}")

              priority = item.get("native_investigation_priority", item.get("nativeInvestigationPriority"))
              if priority not in allowed_priority:
                  raise SystemExit(f"{sid} has invalid native investigation priority: {priority}")

          print("TS18 scenario map covers TS18-STD-001..017 with required field groups")
          PY

      - name: Ensure fixtures and evidence examples are tiny and synthetic
        shell: bash
        run: |
          set -euo pipefail

          for root in docs/templates/fixtures docs/evidence/ts18; do
            [ -d "${root}" ] || continue

            find "${root}" -type f -size +200k -print -quit | {
              read -r large_file || true
              if [ -n "${large_file:-}" ]; then
                echo "ERROR: large evidence/fixture file found: ${large_file}"
                exit 1
              fi
            }

            if find "${root}" -type f \( \
              -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.mp4' -o -iname '*.zip' \
            \) | grep -q .; then
              echo "ERROR: binary screenshots/videos/zips should not be committed as fixtures/evidence examples"
              find "${root}" -type f \( \
                -iname '*.png' -o -iname '*.jpg' -o -iname '*.jpeg' -o -iname '*.mp4' -o -iname '*.zip' \
              \)
              exit 1
            fi
          done

  product-code-guardrails:
    name: Product-code TS18 safety guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Run canonical product-code safety guardrail
        shell: bash
        run: |
          bash scripts/check-headunit-compat-safety.sh

  evidence-redaction:
    name: Evidence redaction smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Smoke-test TS18 evidence redaction
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f scripts/redact_ts18_evidence_summary.sh ]; then
            echo "No redaction helper present; skipping."
            exit 0
          fi

          tmp_dir="$(mktemp -d)"
          trap 'rm -rf "${tmp_dir}"' EXIT

          raw_dir="${tmp_dir}/raw evidence"
          out_dir="${tmp_dir}/redacted evidence"
          mkdir -p "${raw_dir}/nested"

          cat > "${raw_dir}/README.txt" <<'EOF'
          Device serial: SERIAL1234567890ABCDEF
          Bluetooth name: CB Phone
          Wi-Fi SSID: WuTangLAN
          /storage/emulated/0/Music/Private Artist/Private Track.flac
          EOF

          cat > "${raw_dir}/selected_props.txt" <<'EOF'
          [ro.boot.serialno]: [SERIAL1234567890ABCDEF]
          other_id=ABCDEF1234567890ABCDEF1234567890
          EOF

          cat > "${raw_dir}/nested/media_session.txt" <<'EOF'
          session_token=1234567890ABCDEF1234567890ABCDEF
          metadata_title=Private Track Name
          metadata_artist=Private Artist Name
          EOF

          cat > "${raw_dir}/.hidden_info.txt" <<'EOF'
          Hidden serial: SERIAL1234567890ABCDEF
          EOF

          bash scripts/redact_ts18_evidence_summary.sh "${raw_dir}" "${out_dir}"

          test -f "${out_dir}/README.txt"
          test -f "${out_dir}/selected_props.txt"
          test -f "${out_dir}/nested/media_session.txt"
          test -f "${out_dir}/.hidden_info.txt"

          grep -RFn '[REDACTED]' "${out_dir}" || true
          grep -RFn '[HEX_OR_ID_REDACTED]' "${out_dir}" || true

          if grep -RInE \
            'SERIAL1234567890ABCDEF|ABCDEF1234567890ABCDEF1234567890|1234567890ABCDEF1234567890ABCDEF|WuTangLAN|CB Phone|Private Artist|Private Track' \
            "${out_dir}"; then
            echo "ERROR: redaction smoke test leaked sensitive fixture data"
            exit 1
          fi
