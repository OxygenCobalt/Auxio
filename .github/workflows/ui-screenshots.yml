name: UI Screenshots (Roborazzi)

# Manually triggered UI regression / screenshot workflow for Auxio-TS.
#
# Roborazzi tasks are registered by the Roborazzi Gradle plugin in app/build.gradle.
# They run via Robolectric (no emulator required) and produce PNG screenshots under:
#   app/build/outputs/roborazzi/   — captured images
#   app/build/reports/roborazzi/   — HTML comparison reports
#
# Usage:
#   workflow_dispatch → choose a target_ref, variant, and Roborazzi task.
#   variant=topway_twmusic runs record/verify/compareRoborazziTopwayTwMusicDebug.
#   variant=standard runs the matching StandardDebug task.
#   record   — capture screenshots for UI review (default; download the output artifacts).
#   verify   — compare against committed baselines; fails on visual regression.
#   compare  — produce side-by-side diff report without failing.
#   verify_and_record — verify then record any changed baseline.

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch, tag, or commit SHA to run Roborazzi from"
        required: true
        default: dev
      variant:
        description: "App variant to render"
        required: true
        default: topway_twmusic
        type: choice
        options:
          - topway_twmusic
          - standard
      roborazzi_task:
        description: "Roborazzi operation"
        required: true
        default: record
        type: choice
        options:
          - record
          - verify
          - compare
          - verify_and_record
      pr_number:
        description: "Optional PR number for sticky artifact comment"
        required: false
        default: ""
      comment_on_pr:
        description: "Post or update sticky PR artifact comment"
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

env:
  # Mirrors the Roborazzi upstream CI examples: screenshot tests are JVM/Robolectric
  # tasks, but native graphics and Android resource processing need a larger heap.
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx6g -Dorg.gradle.daemon=false -Dkotlin.incremental=false"

concurrency:
  group: ui-screenshots-${{ inputs.target_ref }}-${{ inputs.variant }}-${{ inputs.roborazzi_task }}
  cancel-in-progress: true

jobs:
  roborazzi:
    name: Roborazzi UI screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0
          submodules: recursive
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI environment
        run: bash ./scripts/prepare-ci-environment.sh

      - name: Write local.properties
        run: |
          set -euo pipefail
          sdk_dir="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "${sdk_dir}" ]; then
            echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT is not set."
            exit 1
          fi
          printf 'sdk.dir=%s\n' "${sdk_dir}" > local.properties

      - name: Ensure native build tools are present
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Map Roborazzi task
        id: map_task
        env:
          VARIANT: ${{ inputs.variant }}
          ROBORAZZI_TASK: ${{ inputs.roborazzi_task }}
        run: |
          set -euo pipefail
          case "${VARIANT}" in
            standard) suffix="StandardDebug" ;;
            topway_twmusic) suffix="TopwayTwMusicDebug" ;;
            *) echo "::error::Unknown variant: ${VARIANT}"; exit 1 ;;
          esac
          case "${ROBORAZZI_TASK}" in
            record)            prefix="recordRoborazzi" ;;
            verify)            prefix="verifyRoborazzi" ;;
            compare)           prefix="compareRoborazzi" ;;
            verify_and_record) prefix="verifyAndRecordRoborazzi" ;;
            *) echo "::error::Unknown roborazzi_task: ${ROBORAZZI_TASK}"; exit 1 ;;
          esac
          echo "task=${prefix}${suffix}" >> "$GITHUB_OUTPUT"

      - name: Run Roborazzi
        id: run_roborazzi
        # Scoped to :app to keep execution fast; Roborazzi plugin registers tasks on :app.
        run: ./gradlew --no-daemon --stacktrace :app:${{ steps.map_task.outputs.task }}

      - name: Upload Roborazzi reports
        id: upload_reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-roborazzi-reports
          path: |
            app/build/reports/roborazzi/**
            app/build/reports/tests/**
            app/build/test-results/**
            build/reports/problems/**
          if-no-files-found: warn
          retention-days: 20

      - name: Upload all Roborazzi PNG outputs
        id: upload_outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-roborazzi-outputs
          path: |
            app/build/outputs/roborazzi/**/*.png
            app/src/test/**/roborazzi/**/*.png
            app/src/test/**/*.png
          if-no-files-found: warn
          retention-days: 20

      - name: Upload PNG - main launch landscape
        id: upload_png_main_launch_landscape
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-main-launch-landscape.png
          path: app/build/outputs/roborazzi/main-launch-landscape.png
          if-no-files-found: warn
          retention-days: 20

      - name: Upload PNG - main launch portrait
        id: upload_png_main_launch_portrait
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-main-launch-portrait.png
          path: app/build/outputs/roborazzi/main-launch-portrait.png
          if-no-files-found: warn
          retention-days: 20

      - name: Upload PNG - playback shuffle off landscape
        id: upload_png_playback_shuffle_off_landscape
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-playback-page-shuffle-off-landscape.png
          path: app/build/outputs/roborazzi/playback-page-shuffle-off-landscape.png
          if-no-files-found: warn
          retention-days: 20

      - name: Upload PNG - playback shuffle on landscape
        id: upload_png_playback_shuffle_on_landscape
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-playback-page-shuffle-on-landscape.png
          path: app/build/outputs/roborazzi/playback-page-shuffle-on-landscape.png
          if-no-files-found: warn
          retention-days: 20

      - name: Upload PNG - playback shuffle off portrait
        id: upload_png_playback_shuffle_off_portrait
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-playback-page-shuffle-off-portrait.png
          path: app/build/outputs/roborazzi/playback-page-shuffle-off-portrait.png
          if-no-files-found: warn
          retention-days: 20

      - name: Upload PNG - playback shuffle on portrait
        id: upload_png_playback_shuffle_on_portrait
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-${{ inputs.variant }}-playback-page-shuffle-on-portrait.png
          path: app/build/outputs/roborazzi/playback-page-shuffle-on-portrait.png
          if-no-files-found: warn
          retention-days: 20

      - name: Resolve PR number
        id: resolve_pr
        if: ${{ always() && inputs.comment_on_pr }}
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_REF: ${{ inputs.target_ref }}
          PR_NUMBER_INPUT: ${{ inputs.pr_number }}
        run: |
          set -euo pipefail
          pr_number="${PR_NUMBER_INPUT// /}"
          if [[ -z "${pr_number}" ]]; then
            pr_number=$(gh pr list --state open \
              --head "${{ github.repository_owner }}:${TARGET_REF}" \
              --json number --jq '.[0].number' || true)
          fi
          if [[ -z "${pr_number}" ]]; then
            echo "::warning::No PR number resolved. Pass pr_number explicitly to post screenshot links on a PR."
          fi
          echo "pr_number=${pr_number}" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        if: always()
        env:
          TARGET_REF: ${{ inputs.target_ref }}
          VARIANT: ${{ inputs.variant }}
          RUN_TASK: ${{ steps.map_task.outputs.task }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ROBORAZZI_STATUS: ${{ steps.run_roborazzi.outcome }}
          REPORT_URL: ${{ steps.upload_reports.outputs.artifact-url }}
          OUTPUT_URL: ${{ steps.upload_outputs.outputs.artifact-url }}
          MAIN_LANDSCAPE_URL: ${{ steps.upload_png_main_launch_landscape.outputs.artifact-url }}
          MAIN_PORTRAIT_URL: ${{ steps.upload_png_main_launch_portrait.outputs.artifact-url }}
          PLAYBACK_OFF_LANDSCAPE_URL: ${{ steps.upload_png_playback_shuffle_off_landscape.outputs.artifact-url }}
          PLAYBACK_ON_LANDSCAPE_URL: ${{ steps.upload_png_playback_shuffle_on_landscape.outputs.artifact-url }}
          PLAYBACK_OFF_PORTRAIT_URL: ${{ steps.upload_png_playback_shuffle_off_portrait.outputs.artifact-url }}
          PLAYBACK_ON_PORTRAIT_URL: ${{ steps.upload_png_playback_shuffle_on_portrait.outputs.artifact-url }}
        run: |
          set -euo pipefail
          write_link() {
            local url="$1"
            if [[ -n "${url}" ]]; then
              printf '[download](%s)' "${url}"
            else
              printf 'not available'
            fi
          }

          {
            echo "## Auxio-TS Roborazzi Artifacts"
            echo
            printf -- "- Target ref: \`%s\`\n" "${TARGET_REF}"
            printf -- "- Variant: \`%s\`\n" "${VARIANT}"
            printf -- "- Task: \`%s\`\n" "${RUN_TASK}"
            printf -- "- Result: \`%s\`\n" "${ROBORAZZI_STATUS}"
            printf -- "- Run: %s\n" "${RUN_URL}"
            echo
            echo "### PNG screenshots"
            echo
            echo "| Screenshot | Artifact |"
            echo "|---|---|"
            printf '| `%s` | ' 'main-launch-landscape.png'; write_link "${MAIN_LANDSCAPE_URL}"; echo ' |'
            printf '| `%s` | ' 'main-launch-portrait.png'; write_link "${MAIN_PORTRAIT_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-off-landscape.png'; write_link "${PLAYBACK_OFF_LANDSCAPE_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-on-landscape.png'; write_link "${PLAYBACK_ON_LANDSCAPE_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-off-portrait.png'; write_link "${PLAYBACK_OFF_PORTRAIT_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-on-portrait.png'; write_link "${PLAYBACK_ON_PORTRAIT_URL}"; echo ' |'
            echo
            echo "### Bundles"
            echo
            echo "| Artifact | Link | Contents | Retention |"
            echo "|---|---|---|---|"
            printf '| auxio-ts-%s-roborazzi-reports | ' "${VARIANT}"; write_link "${REPORT_URL}"; echo ' | HTML diff reports and test results | 20 days |'
            printf '| auxio-ts-%s-roborazzi-outputs | ' "${VARIANT}"; write_link "${OUTPUT_URL}"; echo ' | All PNG screenshots | 20 days |'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ always() && inputs.comment_on_pr && steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          TARGET_REF: ${{ inputs.target_ref }}
          VARIANT: ${{ inputs.variant }}
          RUN_TASK: ${{ steps.map_task.outputs.task }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ROBORAZZI_STATUS: ${{ steps.run_roborazzi.outcome }}
          REPORT_URL: ${{ steps.upload_reports.outputs.artifact-url }}
          OUTPUT_URL: ${{ steps.upload_outputs.outputs.artifact-url }}
          MAIN_LANDSCAPE_URL: ${{ steps.upload_png_main_launch_landscape.outputs.artifact-url }}
          MAIN_PORTRAIT_URL: ${{ steps.upload_png_main_launch_portrait.outputs.artifact-url }}
          PLAYBACK_OFF_LANDSCAPE_URL: ${{ steps.upload_png_playback_shuffle_off_landscape.outputs.artifact-url }}
          PLAYBACK_ON_LANDSCAPE_URL: ${{ steps.upload_png_playback_shuffle_on_landscape.outputs.artifact-url }}
          PLAYBACK_OFF_PORTRAIT_URL: ${{ steps.upload_png_playback_shuffle_off_portrait.outputs.artifact-url }}
          PLAYBACK_ON_PORTRAIT_URL: ${{ steps.upload_png_playback_shuffle_on_portrait.outputs.artifact-url }}
        run: |
          set -euo pipefail
          marker="<!-- auxio-ts-roborazzi:${VARIANT}:${RUN_TASK} -->"
          body_file="$(mktemp)"
          write_link() {
            local url="$1"
            if [[ -n "${url}" ]]; then
              printf '[download](%s)' "${url}"
            else
              printf 'not available'
            fi
          }

          {
            echo "$marker"
            echo "## Auxio-TS Roborazzi Artifacts"
            echo
            printf -- "- Target ref: \`%s\`\n" "${TARGET_REF}"
            printf -- "- Variant: \`%s\`\n" "${VARIANT}"
            printf -- "- Task: \`%s\`\n" "${RUN_TASK}"
            printf -- "- Result: \`%s\`\n" "${ROBORAZZI_STATUS}"
            printf -- "- Run: %s\n" "${RUN_URL}"
            echo
            echo "### PNG screenshots"
            echo
            echo "| Screenshot | Artifact |"
            echo "|---|---|"
            printf '| `%s` | ' 'main-launch-landscape.png'; write_link "${MAIN_LANDSCAPE_URL}"; echo ' |'
            printf '| `%s` | ' 'main-launch-portrait.png'; write_link "${MAIN_PORTRAIT_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-off-landscape.png'; write_link "${PLAYBACK_OFF_LANDSCAPE_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-on-landscape.png'; write_link "${PLAYBACK_ON_LANDSCAPE_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-off-portrait.png'; write_link "${PLAYBACK_OFF_PORTRAIT_URL}"; echo ' |'
            printf '| `%s` | ' 'playback-page-shuffle-on-portrait.png'; write_link "${PLAYBACK_ON_PORTRAIT_URL}"; echo ' |'
            echo
            echo "### Bundles"
            echo
            echo "| Artifact | Link | Contents | Retention |"
            echo "|---|---|---|---|"
            printf '| auxio-ts-%s-roborazzi-reports | ' "${VARIANT}"; write_link "${REPORT_URL}"; echo ' | HTML diff reports and test results | 20 days |'
            printf '| auxio-ts-%s-roborazzi-outputs | ' "${VARIANT}"; write_link "${OUTPUT_URL}"; echo ' | All PNG screenshots | 20 days |'
          } > "$body_file"

          comment_id="$(
            gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" |
              jq -r --arg marker "${marker}" '.[] | select(.body | contains($marker)) | .id' |
              head -n1
          )"
          if [[ -n "$comment_id" ]]; then
            jq -n --rawfile body "$body_file" '{"body": $body}' | \
              gh api --method PATCH \
                "repos/${{ github.repository }}/issues/comments/${comment_id}" \
                --input - >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$body_file" >/dev/null
          fi
