name: UI Screenshots (Roborazzi)

# Manually triggered UI regression / screenshot workflow for Auxio-TS.
#
# Roborazzi tasks are registered by the Roborazzi Gradle plugin in app/build.gradle.
# They run via Robolectric (no emulator required) and produce PNG screenshots under:
#   app/build/outputs/roborazzi/   — captured images
#   app/build/reports/roborazzi/   — HTML comparison reports
#
# Usage:
#   workflow_dispatch → choose a roborazzi_task and optionally a target_ref.
#   record   — capture new baseline screenshots (commit the outputs to the repo afterwards).
#   verify   — compare against committed baselines; fails on visual regression.
#   compare  — produce side-by-side diff report without failing.
#   verify_and_record — verify then record any changed baseline.
#
# To reintroduce screenshot baselines: run with record, download the
# auxio-ts-roborazzi-outputs artifact, place the PNGs under
# app/src/test/java/org/oxycblt/auxio/ui/ (next to the test), and commit them.

on:
  workflow_dispatch:
    inputs:
      target_ref:
        description: "Branch, tag, or commit SHA to run Roborazzi from"
        required: true
        default: dev
      roborazzi_task:
        description: "Roborazzi operation"
        required: true
        default: verify
        type: choice
        options:
          - record
          - verify
          - compare
          - verify_and_record
      pr_number:
        description: "Optional PR number for sticky artifact comment"
        required: false
        default: ""
      comment_on_pr:
        description: "Post or update sticky PR artifact comment"
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: ui-screenshots-${{ inputs.target_ref }}
  cancel-in-progress: true

jobs:
  roborazzi:
    name: Roborazzi UI screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.target_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI environment
        run: bash ./scripts/prepare-ci-environment.sh

      - name: Write local.properties
        run: |
          set -euo pipefail
          sdk_dir="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-}}"
          if [ -z "${sdk_dir}" ]; then
            echo "::error::ANDROID_HOME/ANDROID_SDK_ROOT is not set."
            exit 1
          fi
          printf 'sdk.dir=%s\n' "${sdk_dir}" > local.properties

      - name: Ensure native build tools are present
        run: |
          if ! command -v ninja >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          fi

      - name: Map Roborazzi task
        id: map_task
        run: |
          case "${{ inputs.roborazzi_task }}" in
            record)           echo "task=recordRoborazziDebug"          >> "$GITHUB_OUTPUT" ;;
            verify)           echo "task=verifyRoborazziDebug"          >> "$GITHUB_OUTPUT" ;;
            compare)          echo "task=compareRoborazziDebug"         >> "$GITHUB_OUTPUT" ;;
            verify_and_record) echo "task=verifyAndRecordRoborazziDebug" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run Roborazzi
        # Scoped to :app to keep execution fast; Roborazzi plugin registers tasks on :app.
        run: ./gradlew --no-daemon --stacktrace :app:${{ steps.map_task.outputs.task }}

      - name: Upload Roborazzi reports
        id: upload_reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-roborazzi-reports
          path: app/build/reports/roborazzi
          if-no-files-found: warn
          retention-days: 20

      - name: Upload Roborazzi outputs
        id: upload_outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: auxio-ts-roborazzi-outputs
          path: app/build/outputs/roborazzi
          if-no-files-found: warn
          retention-days: 20

      - name: Resolve PR number
        id: resolve_pr
        if: ${{ inputs.comment_on_pr }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pr_input='${{ inputs.pr_number }}'
          pr_number="${pr_input// /}"
          if [[ -z "$pr_number" ]]; then
            pr_number=$(gh pr list --state open \
              --head "${{ github.repository_owner }}:${{ inputs.target_ref }}" \
              --json number --jq '.[0].number' || true)
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Write workflow summary
        env:
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: ${{ steps.upload_reports.outputs.artifact-url }}
          OUTPUT_URL: ${{ steps.upload_outputs.outputs.artifact-url }}
        run: |
          {
            echo "## Auxio-TS Roborazzi Artifacts"
            echo
            echo "- Target ref: \`${{ inputs.target_ref }}\`"
            echo "- Task: \`${{ steps.map_task.outputs.task }}\`"
            echo "- Run: ${RUN_URL}"
            echo
            echo "| Artifact | Link | Contents | Retention |"
            echo "|---|---|---|---|"
            echo "| auxio-ts-roborazzi-reports | ${REPORT_URL:-not available} | HTML diff reports | 20 days |"
            echo "| auxio-ts-roborazzi-outputs | ${OUTPUT_URL:-not available} | PNG screenshots | 20 days |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upsert PR comment
        if: ${{ inputs.comment_on_pr && steps.resolve_pr.outputs.pr_number != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve_pr.outputs.pr_number }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_URL: ${{ steps.upload_reports.outputs.artifact-url }}
          OUTPUT_URL: ${{ steps.upload_outputs.outputs.artifact-url }}
        run: |
          marker='<!-- auxio-ts-roborazzi -->'
          body_file="$(mktemp)"
          {
            echo "$marker"
            echo "## Auxio-TS Roborazzi Artifacts"
            echo
            echo "- Target ref: \`${{ inputs.target_ref }}\`"
            echo "- Task: \`${{ steps.map_task.outputs.task }}\`"
            echo "- Run: ${RUN_URL}"
            echo
            echo "| Artifact | Link | Contents | Retention |"
            echo "|---|---|---|---|"
            echo "| auxio-ts-roborazzi-reports | ${REPORT_URL:-not available} | HTML diff reports | 20 days |"
            echo "| auxio-ts-roborazzi-outputs | ${OUTPUT_URL:-not available} | PNG screenshots | 20 days |"
          } > "$body_file"
          comment_id=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '.[] | select(.body | contains("<!-- auxio-ts-roborazzi -->")) | .id' \
            | head -n1 || true)
          if [[ -n "$comment_id" ]]; then
            jq -n --rawfile body "$body_file" '{"body": $body}' | \
              gh api --method PATCH \
                "repos/${{ github.repository }}/issues/comments/${comment_id}" \
                --input - >/dev/null
          else
            gh pr comment "$PR_NUMBER" --body-file "$body_file" >/dev/null
          fi
